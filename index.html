<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFURB-DIENSTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --waldgruen: #1a2f23; --dunkelgruen: #0f1a14; --hellgruen: #4ade80; --beige: #f5f5dc; --warn-gelb: #facc15; --alarm-rot: #ef4444; }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--dunkelgruen); color: var(--beige); }
        .btn-minimal { background-color: var(--beige); color: var(--dunkelgruen); text-transform: uppercase; font-weight: 700; transition: all 0.2s; }
        .btn-minimal:disabled { background-color: #2d3a33; color: #555; cursor: not-allowed; opacity: 0.5; }
        .card-dark { background-color: var(--waldgruen); border: 1px solid rgba(245, 245, 220, 0.1); }
        .sos-alert { animation: pulse-border 0.5s infinite; border: 2px solid var(--alarm-rot) !important; }
        @keyframes pulse-border { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .wks-badge { background-color: rgba(74, 222, 128, 0.1); border: 1px solid rgba(74, 222, 128, 0.3); }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(245, 245, 220, 0.2) !important; color: var(--beige) !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-[#0f1a14] z-[600] flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 border border-white/10 bg-[#1a2f23]">
            <h1 class="text-2xl font-bold tracking-widest uppercase mb-10 text-center italic">Refurb_Hub</h1>
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="NAME" class="w-full p-4 outline-none uppercase">
                <select id="userStation" class="w-full p-4 outline-none">
                    <option value="WKS050">STATION WKS050</option>
                    <option value="WKS051">STATION WKS051</option>
                    <option value="WKS052">STATION WKS052</option>
                    <option value="WKS053">STATION WKS053</option>
                    <option value="WKS054">STATION WKS054</option>
                    <option value="WKS055">STATION WKS055</option>
                    <option value="WKS056">STATION WKS056</option>
                    <option value="WKS057">STATION WKS057</option>
                    <option value="WKS058">STATION WKS058</option>
                    <option value="WKS059">STATION WKS059</option>
                </select>
                <div class="py-4 space-y-3">
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="checkbox" id="checkWesche" class="w-4 h-4"> <span class="text-[10px] uppercase">🧺 Wäsche-Dienst</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="checkbox" id="checkMull" class="w-4 h-4"> <span class="text-[10px] uppercase">🗑️ Müll-Dienst</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="checkbox" id="checkBoden" class="w-4 h-4"> <span class="text-[10px] uppercase">🧹 Boden-Dienst</span></label>
                </div>
                <button onclick="doLogin()" class="w-full btn-minimal p-5 text-sm tracking-widest">System Starten</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="border-b border-white/10 p-4 sticky top-0 bg-[#0f1a14]/95 backdrop-blur-sm z-50">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="text-xl font-bold border border-beige px-2 uppercase italic">R</div>
                    <div>
                        <p id="displayUser" class="text-[10px] text-hellgruen uppercase font-bold"></p>
                        <div id="quickMachineStatus" class="flex gap-2 mt-1">
                            <span id="m1-badge" class="text-[8px] px-2 border border-white/10 uppercase">M1: ...</span>
                            <span id="m2-badge" class="text-[8px] px-2 border border-white/10 uppercase">M2: ...</span>
                            <span id="m3-badge" class="text-[8px] px-2 border border-white/10 uppercase">M3: ...</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex flex-col gap-1">
                        <button onclick="quickMull('Restmüll')" class="text-[8px] border border-white/30 px-2 py-1 uppercase">🗑️ Restmüll</button>
                        <button onclick="quickMull('Papier')" class="text-[8px] border border-white/30 px-2 py-1 uppercase">📄 Papier</button>
                    </div>
                    <div class="flex flex-col items-center">
                        <button id="btn-wash-request" onclick="sendWash()" class="bg-hellgruen text-dunkelgruen px-4 py-1 text-[10px] font-bold uppercase disabled:opacity-30">🧺 Korb Voll</button>
                        <span id="wash-timer" class="text-[8px] mt-1 text-red-400 hidden"></span>
                    </div>
                    <input type="text" id="userNotiz" placeholder="NOTIZ..." class="p-1 text-[10px] w-24 uppercase bg-transparent border border-white/10">
                    <label class="text-[10px] text-red-500 font-bold uppercase flex items-center gap-1 border border-red-900 px-2 py-1 cursor-pointer"><input type="checkbox" id="isUrgent"> DRINGEND</label>
                </div>
            </div>
        </header>

        <div id="auto-notify" class="max-w-7xl mx-auto px-4 mt-4 hidden">
            <div id="notify-box" class="p-6 flex flex-col md:flex-row justify-between items-center rounded gap-4 border-2">
                <div class="flex flex-col">
                    <span id="notify-msg" class="text-lg font-black uppercase italic tracking-tighter"></span>
                    <span id="notify-sub" class="text-[10px] uppercase font-bold opacity-70 mt-1"></span>
                </div>
                <button id="btn-action" onclick="handleAlarmAction()" class="btn-minimal px-10 py-4 text-sm shadow-xl uppercase">Erledigt</button>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div id="weschePanel" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8">
                    <div id="notizMonitor" class="hidden card-dark p-4 border-warn-gelb border-2 mb-6">
                        <div id="notizList" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="card-dark p-6">
                        <h3 class="text-[10px] uppercase opacity-40 mb-4 tracking-widest border-b border-white/10 pb-2">Offene Abholungen</h3>
                        <div id="wescheList" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </div>
                </div>
                <div class="lg:col-span-4 space-y-4">
                    <h3 class="text-[10px] uppercase opacity-40 text-center tracking-widest italic">Maschinen</h3>
                    <div id="m-ui-1" class="card-dark p-4 border-l-4"></div>
                    <div id="m-ui-2" class="card-dark p-4 border-l-4"></div>
                    <div id="m-ui-3" class="card-dark p-4 border-l-4"></div>
                </div>
            </div>
            
            <div id="mullPanel" class="hidden max-w-2xl mx-auto space-y-3 mt-4">
                <h3 class="text-[10px] uppercase opacity-40 tracking-widest border-b border-white/10 pb-2">Müll-Aufträge</h3>
                <div id="mullList" class="space-y-2"></div>
            </div>
        </main>
    </div>

    <div id="bodenModal" class="fixed inset-0 bg-dunkelgruen/95 flex items-center justify-center hidden z-[700] p-10">
        <div class="card-dark p-12 text-center border-hellgruen border-2">
            <h2 class="text-4xl font-bold mb-8 uppercase italic text-hellgruen">Bodendienst 🧹</h2>
            <p class="mb-8 opacity-70">Es ist 14:00 Uhr. Zeit für die Reinigung.</p>
            <button onclick="stopBodenAlarm()" class="btn-minimal px-12 py-6 text-lg uppercase">Erledigt / Verstanden</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ", databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", authDomain: "dienste-fluxs.firebaseapp.com", projectId: "dienste-fluxs", storageBucket: "dienste-fluxs.firebasestorage.app", messagingSenderId: "137594684055", appId: "1:137594684055:web:2e2ddc1ed5ce8ff8f6dfd2" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        let userConfig = { name: "", station: "", wesche: false, mull: false, boden: false };
        let currentCount = 0; let mullCount = 0; let blinkInterval = null; let activeIntervals = {};

        function doLogin() {
            const n = document.getElementById('userName').value; if(!n) return;
            if (Notification.permission !== "granted") { Notification.requestPermission(); }
            userConfig = { name: n.toUpperCase(), station: document.getElementById('userStation').value, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked, boden: document.getElementById('checkBoden').checked };
            database.ref('online_users/' + n).set(userConfig); database.ref('online_users/' + n).onDisconnect().remove();
            document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUser').innerText = `${userConfig.name} | ${userConfig.station}`;
            if(userConfig.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(userConfig.mull) document.getElementById('mullPanel').classList.remove('hidden');
            syncApp();
            if(userConfig.boden) startBodenCheck();
        }

        function startTabBlink(msg) {
            if(blinkInterval) return;
            if(Notification.permission === "granted" && document.hidden) { new Notification("ALARM", { body: msg }); }
            blinkInterval = setInterval(() => { document.title = document.title === "⚠️ ALARM" ? "REFURB HUB" : "⚠️ ALARM"; }, 1000);
            window.addEventListener('mousemove', () => { clearInterval(blinkInterval); blinkInterval = null; document.title = "REFURB-DIENSTE"; }, {once: true});
        }

        function syncApp() {
            // Müll Sync & Alarm
            database.ref('mull_pozivi').on('value', s => {
                mullCount = s.numChildren();
                const l = document.getElementById('mullList'); l.innerHTML = '';
                s.forEach(c => { l.innerHTML += `<div class="card-dark p-4 flex justify-between items-center text-[10px] font-bold uppercase"><span>📍 ${c.val().station} - ${c.val().detail}</span><button onclick="database.ref('mull_pozivi/${c.key}').remove()" class="btn-minimal px-3 py-1 text-[8px]">OK</button></div>`; });
                updateGlobalState();
            });

            // Wäsche Sync
            database.ref('ves_pozivi').on('value', s => {
                const list = document.getElementById('wescheList'); const nl = document.getElementById('notizList');
                list.innerHTML = ''; nl.innerHTML = ''; currentCount = s.numChildren(); let hasNotiz = false;
                s.forEach(c => { const i = c.val(); if(i.notiz) { hasNotiz = true; nl.innerHTML += `<div class="bg-warn-gelb text-black px-2 py-1 text-[9px] uppercase font-bold">⚠️ ${i.station}: ${i.notiz}</div>`; } list.innerHTML += `<div class="p-3 wks-badge text-center text-[10px] font-black ${i.urgent?'sos-alert':''}">📍 ${i.station}</div>`; });
                document.getElementById('notizMonitor').classList.toggle('hidden', !hasNotiz);
                updateGlobalState();
            });

            // Maschinen Sync
            [1, 2, 3].forEach(id => {
                database.ref('timers/m'+id).on('value', s => {
                    const d = s.val(); const ui = document.getElementById('m-ui-'+id); const badge = document.getElementById('m'+id+'-badge');
                    if(activeIntervals[id]) clearInterval(activeIntervals[id]);
                    if(!d) {
                        ui.className = "card-dark p-4 border-l-4 border-hellgruen";
                        ui.innerHTML = `<div class="flex justify-between font-bold text-[10px]"><span class="opacity-50">M${id}</span><span class="text-hellgruen">FREI</span></div><button onclick="startMachine(${id})" class="btn-minimal w-full mt-3 py-1 text-[9px]">START</button>`;
                        badge.className = "text-[8px] px-2 border border-white/10 opacity-30"; badge.innerText = `M${id}: OK`;
                    } else {
                        ui.className = "card-dark p-4 border-l-4 border-white/20";
                        activeIntervals[id] = setInterval(() => {
                            const diff = d.endTime - Date.now();
                            if(diff <= 0) { ui.innerHTML = `<div class="flex justify-between text-red-500 font-bold text-[10px]"><span>M${id} FERTIG</span></div><button onclick="finishMachine(${id})" class="btn-minimal w-full mt-3 py-1 text-[9px]">LEEREN</button>`; }
                            else { const m = Math.floor(diff/60000); const sec = Math.floor((diff%60000)/1000); ui.innerHTML = `<div class="flex justify-between text-[10px] opacity-70 mb-2"><span>M${id} LÄUFT</span><span>${m}:${sec<10?'0':''}${sec}</span></div><button onclick="finishMachine(${id})" class="text-[8px] text-red-400 underline uppercase w-full text-center">Stop</button>`; }
                        }, 1000);
                        badge.className = "text-[8px] px-2 border border-hellgruen text-hellgruen"; badge.innerText = `M${id}: ON`;
                    }
                    updateGlobalState();
                });
            });
        }

        async function updateGlobalState() {
            const bar = document.getElementById('auto-notify'); const msg = document.getElementById('notify-msg'); const sub = document.getElementById('notify-sub'); const box = document.getElementById('notify-box');
            let alarm = false;

            // 1. MÜLL ALARM (NUR MÜLLDIENST)
            if(userConfig.mull && mullCount >= 2) {
                alarm = true; msg.innerText = "🗑️ Müll abholen!"; sub.innerText = mullCount + " offene Meldungen in der Liste.";
                box.className = "p-6 flex flex-col md:flex-row justify-between items-center rounded gap-4 border-2 border-warn-gelb bg-warn-gelb/10 text-warn-gelb";
                startTabBlink("Müll abholen!");
            }

            // 2. WÄSCHE ALARME (NUR WÄSCHEDIENST)
            if(userConfig.wesche && !alarm) {
                const snap = await database.ref('timers').once('value'); const t = snap.val() || {};
                let free = 0; let finished = 0;
                for(let i=1; i<=3; i++) { if(!t['m'+i]) free++; else if(t['m'+i].endTime < Date.now()) finished++; }

                if(currentCount >= 10 && finished === 3) { alarm=true; msg.innerText="☢️ MAXIMALER STAU"; sub.innerText="10+ Körbe & Alle Maschinen fertig!"; box.className="p-6 border-2 border-red-500 bg-red-900/40 animate-pulse"; startTabBlink("KATASTROPHE!"); }
                else if(currentCount >= 6 && free >= 2) { alarm=true; msg.innerText="🚨 WAGEN VOLL"; sub.innerText="6 Körbe warten - 2 Maschinen frei!"; box.className="p-6 border-2 border-hellgruen bg-hellgruen/10"; startTabBlink("Wagen voll!"); }
                else if(currentCount >= 3 && free >= 1) { alarm=true; msg.innerText="🧺 RUNDGANG"; sub.innerText="3 Körbe warten - 1 Maschine frei."; box.className="p-6 border-2 border-warn-gelb bg-warn-gelb/10"; }
            }

            bar.classList.toggle('hidden', !alarm);
        }

        function handleAlarmAction() {
            if(userConfig.wesche) database.ref('ves_pozivi').remove();
            document.getElementById('auto-notify').classList.add('hidden');
            clearInterval(blinkInterval); blinkInterval = null;
        }

        function startBodenCheck() {
            setInterval(() => {
                const now = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', timeZone:'Europe/Berlin'});
                if(now === "14:00") { document.getElementById('bodenModal').classList.remove('hidden'); startTabBlink("BODENDIENST!"); }
            }, 60000);
        }

        function stopBodenAlarm() { document.getElementById('bodenModal').classList.add('hidden'); clearInterval(blinkInterval); blinkInterval = null; }
        function startMachine(id) { database.ref('timers/m'+id).set({ endTime: Date.now()+(80*60*1000) }); }
        function finishMachine(id) { database.ref('timers/m'+id).remove(); }
        function sendWash() { database.ref('ves_pozivi/'+Date.now()).set({ station: userConfig.station, notiz: document.getElementById('userNotiz').value, urgent: document.getElementById('isUrgent').checked }); document.getElementById('userNotiz').value=""; }
        function quickMull(d) { database.ref('mull_pozivi/'+Date.now()).set({ station: userConfig.station, detail: d }); }
    </script>
</body>
</html>
