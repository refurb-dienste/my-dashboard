<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>refurb-dienste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; font-weight: bold; background-color: #f0f4f0; }
        .forest-green { background-color: #1a3c34; }
        .urgent-alert { animation: pulse 2s infinite; }
        .dringend-alert { animation: pulse 0.8s infinite; border-left-color: #ef4444 !important; background-color: #fef2f2 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .is-seen { animation: none !important; opacity: 0.6; background-color: #e2e8f0 !important; border-left-color: #94a3b8 !important; }
        @keyframes blink-green { 0% { background-color: #fff; } 50% { background-color: #dcfce7; } 100% { background-color: #fff; } }
        .timer-finished { animation: blink-green 1s infinite; border: 4px solid #1a3c34 !important; }
        input, select, button { font-family: 'Courier New', Courier, monospace; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div id="loginScreen" class="fixed inset-0 bg-[#1a3c34] z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-none shadow-2xl max-w-md w-full text-center border-b-[12px] border-[#1a3c34]">
            <h1 class="text-3xl font-black mb-2 text-slate-900 uppercase">Aufbereitung</h1>
            <div class="space-y-4 text-left">
                <label class="text-[10px] uppercase text-slate-400">Name:</label>
                <input type="text" id="userName" placeholder="NAME EINGEBEN" class="w-full bg-slate-100 border-2 border-slate-200 p-4 rounded-none outline-none focus:border-[#1a3c34] mb-2">
                
                <label class="text-[10px] uppercase text-slate-400">Meine Workstation:</label>
                <select id="userStation" class="w-full bg-slate-100 border-2 border-slate-200 p-4 rounded-none outline-none focus:border-[#1a3c34] mb-4">
                    <option value="wks050">wks050</option><option value="wks051">wks051</option>
                    <option value="wks052">wks052</option><option value="wks053">wks053</option>
                    <option value="wks054">wks054</option><option value="wks055">wks055</option>
                    <option value="wks056">wks056</option><option value="wks057">wks057</option>
                    <option value="wks058">wks058</option><option value="wks059">wks059</option>
                </select>

                <div class="grid grid-cols-1 gap-2">
                    <label class="flex items-center p-3 bg-slate-50 border border-slate-200 cursor-pointer"><input type="checkbox" id="checkWesche" class="w-5 h-5 accent-[#1a3c34]"><span class="ml-4 uppercase text-xs">Wäschedienst</span></label>
                    <label class="flex items-center p-3 bg-slate-50 border border-slate-200 cursor-pointer"><input type="checkbox" id="checkMull" class="w-5 h-5 accent-[#1a3c34]"><span class="ml-4 uppercase text-xs">Müll-Dienst</span></label>
                    <label class="flex items-center p-3 bg-slate-50 border border-slate-200 cursor-pointer"><input type="checkbox" id="checkBoden" class="w-5 h-5 accent-[#1a3c34]"><span class="ml-4 uppercase text-xs">Bodendienst</span></label>
                </div>
                <button onclick="doLogin()" class="w-full bg-[#1a3c34] text-white p-5 rounded-none uppercase hover:bg-black transition-all mt-4">Starten</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="bg-white border-b-4 border-[#1a3c34] p-4 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-[#1a3c34] text-white flex items-center justify-center text-xl">A</div>
                    <div><h1 class="font-black text-xl uppercase tracking-tighter">Aufbereitung</h1><p id="displayUser" class="text-[10px] text-[#1a3c34] uppercase"></p></div>
                </div>
                
                <div class="flex flex-wrap items-center gap-2 bg-[#1a3c34] p-3 shadow-xl">
                    <span id="activeStationDisplay" class="bg-white px-3 py-2 text-[#1a3c34] text-xs"></span>
                    <div class="flex gap-1 border-r border-white/20 pr-2 mr-2">
                        <button onclick="quickMull('Restmüll 🗑️')" class="bg-slate-700 text-white px-3 py-2 text-[10px] uppercase hover:bg-black">Restmüll</button>
                        <button onclick="quickMull('Papier 📄')" class="bg-blue-700 text-white px-3 py-2 text-[10px] uppercase hover:bg-blue-900">Papier</button>
                    </div>
                    <select id="washType" class="p-2 rounded-none text-xs uppercase outline-none">
                        <option value="Wäschekorb voll">🧺 Wäschekorb voll</option>
                    </select>
                    <input type="text" id="userNotiz" placeholder="NOTIZ" class="p-2 rounded-none text-xs uppercase outline-none w-32">
                    <label class="flex items-center bg-white/10 px-2 py-1 cursor-pointer text-white text-[10px] uppercase">
                        <input type="checkbox" id="isUrgent" class="mr-1 accent-red-500"> DRINGEND!
                    </label>
                    <button onclick="smartSend()" class="bg-white text-[#1a3c34] px-4 py-2 hover:bg-green-100 uppercase text-xs">Senden</button>
                </div>

                <div id="liveStatus" class="bg-slate-100 p-2 text-[9px] uppercase border border-slate-200 min-w-[150px]">
                    <p class="font-black border-b border-slate-300 mb-1">Aktiv:</p>
                    <div id="statusList" class="space-y-1"></div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div id="weschePanel" class="bg-white p-8 border-t-8 border-[#1a3c34] hidden shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-lg uppercase">Wäsche Monitor</h2>
                        <div class="flex flex-col items-end gap-2">
                            <div id="timer-display" class="text-3xl bg-slate-100 px-4 py-2 text-[#1a3c34]">90:00</div>
                            <button onclick="triggerSyncTimer()" class="bg-[#1a3c34] text-white px-4 py-2 text-[10px] uppercase hover:bg-black">Maschine Start ↻</button>
                        </div>
                    </div>
                    <div id="wescheList" class="space-y-4"></div>
                </div>
                <div id="mullPanel" class="bg-white p-8 border-t-8 border-slate-800 hidden shadow-sm">
                    <h2 class="text-lg uppercase mb-6">Müll Monitor</h2>
                    <div id="mullList" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="bodenModal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-[200]">
        <div class="bg-white p-12 text-center max-w-lg border-b-[12px] border-[#1a3c34]">
            <h2 class="text-3xl font-black mb-4 uppercase text-[#1a3c34]">Bodendienst</h2>
            <p class="text-slate-500 mb-8 font-bold text-xl uppercase">Boden reinigen!</p>
            <button onclick="closeBoden()" class="bg-[#1a3c34] text-white px-12 py-5 text-xl uppercase">Erledigt ✅</button>
        </div>
    </div>

    <audio id="alarm-finished" src="https://actions.google.com/sounds/v1/alarms/alarm_clock_beep.ogg"></audio>
    <audio id="notif-sound" src="https://actions.google.com/sounds/v1/alerts/notification_simple-01.ogg"></audio>
    <audio id="urgent-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ",
  databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", 
  authDomain: "dienste-fluxs.firebaseapp.com",
  projectId: "dienste-fluxs",
  storageBucket: "dienste-fluxs.firebasestorage.app",
  messagingSenderId: "137594684055",
  appId: "1:137594684055:web:2e2ddc1ed5ce8ff8f6dfd2"
};
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userConfig = { name: "", station: "", wesche: false, mull: false, boden: false };
        let firstLoad = { wesche: true, mull: true };
        let localTimerInterval = null;

        function doLogin() {
            const name = document.getElementById('userName').value;
            const station = document.getElementById('userStation').value;
            if(!name) return alert("NAME EINGEBEN!");
            userConfig = { name, station, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked, boden: document.getElementById('checkBoden').checked };
            
            // Register as Online
            const onlineRef = database.ref('online_users/' + name + '_' + station);
            onlineRef.set({ name, station, wesche: userConfig.wesche, mull: userConfig.mull, boden: userConfig.boden });
            onlineRef.onDisconnect().remove();

            document.getElementById('displayUser').innerText = `USER: ${name} | ${station}`;
            document.getElementById('activeStationDisplay').innerText = station;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            if(userConfig.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(userConfig.mull) document.getElementById('mullPanel').classList.remove('hidden');
            
            listenToTimer();
            listenToOnlineUsers();
        }

        // SYNC TIMER LOGIC
        function triggerSyncTimer() {
            const endTime = Date.now() + (90 * 60 * 1000);
            database.ref('sync_timer').set({ endTime, startedBy: userConfig.name });
            database.ref('ves_pozivi/SYSTEM').set({ 
                station: "INFO", detail: "🔄 MASCHINE START", notiz: "Läuft für 90 min", 
                urgent: false, sender: userConfig.name, 
                time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}), seen: false
            });
        }

        function listenToTimer() {
            database.ref('sync_timer').on('value', (s) => {
                const data = s.val();
                if(!data) return;
                if(localTimerInterval) clearInterval(localTimerInterval);
                document.getElementById('weschePanel').classList.remove('timer-finished');

                localTimerInterval = setInterval(() => {
                    const now = Date.now();
                    const diff = data.endTime - now;
                    if(diff <= 0) {
                        clearInterval(localTimerInterval);
                        document.getElementById('timer-display').textContent = "FERTIG!";
                        document.getElementById('weschePanel').classList.add('timer-finished');
                        if(userConfig.wesche) document.getElementById('alarm-finished').play();
                    } else {
                        const totalSec = Math.floor(diff / 1000);
                        const min = Math.floor(totalSec / 60);
                        const sek = totalSec % 60;
                        document.getElementById('timer-display').textContent = (min < 10 ? "0":"") + min + ":" + (sek < 10 ? "0":"") + sek;
                    }
                }, 1000);
            });
        }

        function listenToOnlineUsers() {
            database.ref('online_users').on('value', (s) => {
                const list = document.getElementById('statusList');
                list.innerHTML = '';
                if(!s.val()) return;
                Object.values(s.val()).forEach(u => {
                    let roles = [];
                    if(u.wesche) roles.push("Wäsche");
                    if(u.mull) roles.push("Müll");
                    if(u.boden) roles.push("Boden");
                    list.innerHTML += `<div><span class="text-[#1a3c34] font-black">${u.name} (${u.station})</span>: ${roles.join(', ')}</div>`;
                });
            });
        }

        function quickMull(type) {
            database.ref('mull_pozivi/' + userConfig.station).set({ 
                station: userConfig.station, detail: type, notiz: "", urgent: false,
                sender: userConfig.name, time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}), seen: false
            });
        }

        function smartSend() {
            const type = document.getElementById('washType').value;
            const notiz = document.getElementById('userNotiz').value;
            const urgent = document.getElementById('isUrgent').checked;
            database.ref('ves_pozivi/' + userConfig.station).set({ 
                station: userConfig.station, detail: type, notiz, urgent: urgent,
                sender: userConfig.name, time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}), seen: false
            });
            document.getElementById('isUrgent').checked = false;
            document.getElementById('userNotiz').value = ""; 
        }

        database.ref('ves_pozivi/').on('value', (s) => handleNewData(s, 'wescheList', 'ves_pozivi', userConfig.wesche, 'wesche'));
        database.ref('mull_pozivi/').on('value', (s) => handleNewData(s, 'mullList', 'mull_pozivi', userConfig.mull, 'mull'));

        function handleNewData(snapshot, elementId, path, hasRole, typeKey) {
            if(!firstLoad[typeKey] && snapshot.val() && hasRole) {
                let hasUrgent = false;
                snapshot.forEach(child => { if(child.val().urgent && !child.val().seen) hasUrgent = true; });
                if(hasUrgent) document.getElementById('urgent-sound').play();
                else document.getElementById('notif-sound').play();
            }
            firstLoad[typeKey] = false;
            renderList(snapshot, elementId, path, hasRole);
        }

        function renderList(snapshot, elementId, path, hasRole) {
            const container = document.getElementById(elementId);
            if(!container || !hasRole) return;
            container.innerHTML = '';
            if(snapshot.val()) {
                snapshot.forEach(child => {
                    const item = child.val();
                    let statusClass = item.seen ? 'is-seen' : (item.urgent ? 'dringend-alert' : 'urgent-alert');
                    container.innerHTML += `<div class="bg-slate-50 p-4 border-l-8 border-[#1a3c34] flex justify-between items-center ${statusClass}">
                        <div><p class="text-[10px] text-[#1a3c34] uppercase font-black">${item.station} ${item.urgent ? '🔥 DRINGEND' : ''}</p>
                        <p class="text-lg uppercase font-black">${item.detail}</p>
                        ${item.notiz ? `<p class="text-xs bg-yellow-100 p-1 mt-1 border border-yellow-200">INFO: ${item.notiz}</p>` : ''}
                        <p class="text-[8px] text-slate-400 mt-1 lowercase">${item.time} - Von: ${item.sender}</p></div>
                        <div class="flex gap-1"><button onclick="markAsSeen('${path}', '${child.key}')" class="bg-slate-200 text-black p-3 hover:bg-slate-300">👁️</button>
                        <button onclick="removeItem('${path}', '${child.key}')" class="bg-black text-white p-3 hover:bg-green-800">✔️</button></div></div>`;
                });
            } else { container.innerHTML = '<p class="text-slate-300 italic text-xs uppercase">Warten...</p>'; }
        }

        function markAsSeen(path, id) { database.ref(path + '/' + id).update({ seen: true }); }
        function removeItem(p, id) { database.ref(p + '/' + id).remove(); }

        setInterval(() => {
            const now = new Date();
            const cet = new Intl.DateTimeFormat('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }).format(now);
            if(userConfig.boden && cet === "14:00") {
                document.getElementById('bodenModal').classList.remove('hidden');
                document.getElementById('alarm-finished').play();
            }
        }, 60000);
        function closeBoden() { document.getElementById('bodenModal').classList.add('hidden'); }
    </script>
</body>
</html>
