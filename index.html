<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REFURB-DIENSTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --waldgruen: #1a2f23; --dunkelgruen: #0f1a14; --hellgruen: #4ade80; --beige: #f5f5dc; --warn-gelb: #facc15; }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--dunkelgruen); color: var(--beige); overflow-x: hidden; }
        .border-subtle { border-color: rgba(245, 245, 220, 0.1); }
        .btn-minimal { background-color: var(--beige); color: var(--dunkelgruen); text-transform: uppercase; font-weight: 700; transition: all 0.2s; }
        .btn-minimal:hover { background-color: var(--hellgruen); }
        .btn-minimal:disabled { background-color: #2d3a33; color: #555; cursor: not-allowed; opacity: 0.5; }
        .card-dark { background-color: var(--waldgruen); border: 1px solid rgba(245, 245, 220, 0.1); }
        .sos-alert { animation: pulse-border 0.5s infinite; border: 2px solid #ef4444 !important; }
        @keyframes pulse-border { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .notiz-highlight { background-color: var(--warn-gelb); color: black; font-weight: bold; }
        input, select { background: rgba(0,0,0,0.3) !important; border: 1px solid rgba(245, 245, 220, 0.2) !important; color: var(--beige) !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-[#0f1a14] z-[600] flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 border border-subtle bg-[#1a2f23]">
            <h1 class="text-2xl font-bold tracking-widest uppercase mb-10 text-center">REFURB_HUB</h1>
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="NAME" class="w-full p-4 outline-none uppercase">
                <select id="userStation" class="w-full p-4 outline-none">
                    <option value="WKS050">STATION WKS050</option>
                    <option value="WKS051">STATION WKS051</option>
                    <option value="WKS052">STATION WKS052</option>
                    <option value="WKS053">STATION WKS053</option>
                    <option value="WKS054">STATION WKS054</option>
                    <option value="WKS055">STATION WKS055</option>
                    <option value="WKS056">STATION WKS056</option>
                    <option value="WKS057">STATION WKS057</option>
                    <option value="WKS058">STATION WKS058</option>
                    <option value="WKS059">STATION WKS059</option>
                </select>
                <div class="py-4 space-y-3">
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="checkbox" id="checkWesche" class="w-4 h-4"> <span class="text-xs uppercase">🧺 Wäsche-Dienst</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="checkbox" id="checkMull" class="w-4 h-4"> <span class="text-xs uppercase">🗑️ Müll-Dienst</span></label>
                </div>
                <button onclick="doLogin()" class="w-full btn-minimal p-5 text-sm tracking-widest">System Starten</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="border-b border-subtle p-4 sticky top-0 bg-[#0f1a14]/95 backdrop-blur-sm z-50">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="text-xl font-bold border border-beige px-2 uppercase">R</div>
                    <div>
                        <p id="displayUser" class="text-[10px] text-hellgruen uppercase font-bold"></p>
                        <div id="quickMachineStatus" class="flex gap-2 mt-1">
                            <span id="m1-badge" class="text-[8px] px-2 border border-subtle uppercase">M1: ...</span>
                            <span id="m2-badge" class="text-[8px] px-2 border border-subtle uppercase">M2: ...</span>
                            <span id="m3-badge" class="text-[8px] px-2 border border-subtle uppercase">M3: ...</span>
                        </div>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <button onclick="quickMull('Müll 🗑️')" class="text-[10px] border border-beige/30 px-3 py-1 uppercase">🗑️ Müll</button>
                    <button onclick="sendWash()" class="bg-hellgruen text-dunkelgruen px-4 py-1 text-[10px] font-bold uppercase">🧺 Korb Voll</button>
                    <input type="text" id="userNotiz" placeholder="NOTIZ..." class="p-1 text-[10px] w-24 uppercase bg-transparent border border-subtle">
                    <label class="text-[10px] text-red-500 font-bold uppercase flex items-center gap-1 border border-red-900 px-2 py-1 cursor-pointer"><input type="checkbox" id="isUrgent"> SOS</label>
                </div>
            </div>
        </header>

        <div id="auto-notify" class="max-w-7xl mx-auto px-4 mt-4 hidden">
            <div id="notify-box" class="p-4 flex flex-col md:flex-row justify-between items-center rounded gap-4 border-2">
                <div class="flex flex-col">
                    <span id="notify-msg" class="text-sm font-black uppercase italic"></span>
                    <span id="notify-sub" class="text-[10px] uppercase font-bold opacity-70"></span>
                </div>
                <button id="btn-rundgang" onclick="startRundgang()" class="btn-minimal px-8 py-3 text-xs">Rundgang Starten 🏃‍♂️</button>
            </div>
        </div>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div id="weschePanel" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-8 space-y-6">
                    <div id="notizMonitor" class="hidden card-dark p-4 border-warn-gelb border-2">
                        <div id="notizList" class="flex flex-wrap gap-2"></div>
                    </div>
                    <div class="card-dark p-6">
                        <h3 class="text-[10px] uppercase opacity-40 mb-4 tracking-widest border-b border-subtle pb-2">Warteschlange Abholung</h3>
                        <div id="wescheList" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </div>
                </div>

                <div class="lg:col-span-4 space-y-4">
                    <h3 class="text-[10px] uppercase opacity-40 text-center tracking-widest italic">Maschinen-Raum</h3>
                    <div id="m-ui-1" class="card-dark p-4 border-l-4"></div>
                    <div id="m-ui-2" class="card-dark p-4 border-l-4"></div>
                    <div id="m-ui-3" class="card-dark p-4 border-l-4"></div>
                </div>
            </div>

            <div id="mullPanel" class="hidden max-w-2xl mx-auto space-y-3 mt-10"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ", databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", authDomain: "dienste-fluxs.firebaseapp.com", projectId: "dienste-fluxs", storageBucket: "dienste-fluxs.firebasestorage.app", messagingSenderId: "137594684055", appId: "1:137594684055:web:2e2ddc1ed5ce8ff8f6dfd2" };
        firebase.initializeApp(firebaseConfig); const database = firebase.database();
        let userConfig = { name: "", station: "", wesche: false };
        let currentCount = 0; let freeMachines = 0; let activeIntervals = {};

        function doLogin() {
            const n = document.getElementById('userName').value; const s = document.getElementById('userStation').value; if(!n) return;
            userConfig = { name: n.toUpperCase(), station: s, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked };
            document.getElementById('displayUser').innerText = `${userConfig.name} | ${userConfig.station}`;
            document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden');
            if(userConfig.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(userConfig.mull) document.getElementById('mullPanel').classList.remove('hidden');
            syncApp();
        }

        function syncApp() {
            // Maschinenüberwachung
            [1, 2, 3].forEach(id => {
                database.ref('timers/m'+id).on('value', s => {
                    const d = s.val(); const ui = document.getElementById('m-ui-'+id); const badge = document.getElementById('m'+id+'-badge');
                    if(activeIntervals[id]) clearInterval(activeIntervals[id]);
                    if(!d) {
                        ui.className = "card-dark p-4 border-l-4 border-hellgruen";
                        ui.innerHTML = `<div class="flex justify-between font-bold text-[10px]"><span class="opacity-50 uppercase">Maschine ${id}</span><span class="text-hellgruen">BEREIT</span></div>
                                        <button onclick="startMachine(${id})" class="btn-minimal w-full mt-3 py-1 text-[9px]">Beladen & Start</button>`;
                        badge.className = "text-[8px] px-2 border border-hellgruen text-hellgruen"; badge.innerText = `M${id}: OK`;
                    } else {
                        ui.className = "card-dark p-4 border-l-4 border-white/20";
                        activeIntervals[id] = setInterval(() => {
                            const diff = d.endTime - Date.now();
                            if(diff <= 0) {
                                ui.innerHTML = `<div class="flex justify-between font-bold text-[10px] text-red-500"><span>M${id} FERTIG</span><span>00:00</span></div>
                                                <button onclick="finishMachine(${id})" class="btn-minimal w-full mt-3 py-1 text-[9px]">Entleeren</button>`;
                            } else {
                                const m = Math.floor(diff/60000); const sec = Math.floor((diff%60000)/1000);
                                ui.innerHTML = `<div class="flex justify-between font-bold text-[10px] opacity-70"><span>M${id} LÄUFT</span><span>${m}:${sec<10?'0':''}${sec}</span></div>
                                                <button onclick="finishMachine(${id})" class="text-[8px] mt-2 underline opacity-30 w-full">Abbruch</button>`;
                            }
                        }, 1000);
                        badge.className = "text-[8px] px-2 border border-white/10 opacity-40"; badge.innerText = `M${id}: BUSY`;
                    }
                    updateGlobalState();
                });
            });

            // Abholungsüberwachung
            database.ref('ves_pozivi').on('value', s => {
                const list = document.getElementById('wescheList'); const nl = document.getElementById('notizList');
                list.innerHTML = ''; nl.innerHTML = ''; currentCount = 0; let hasNotiz = false;
                s.forEach(c => {
                    const i = c.val(); currentCount++;
                    if(i.notiz) { hasNotiz = true; nl.innerHTML += `<div class="notiz-highlight px-2 py-1 text-[9px] uppercase">⚠️ ${i.station}: ${i.notiz}</div>`; }
                    list.innerHTML += `<div class="p-3 bg-[#0f1a14] border border-white/10 text-center text-[10px] font-bold ${i.urgent?'sos-alert':''}">📍 ${i.station}</div>`;
                });
                document.getElementById('notizMonitor').classList.toggle('hidden', !hasNotiz);
                updateGlobalState();
            });

            // Müllüberwachung
            database.ref('mull_pozivi').on('value', s => {
                const l = document.getElementById('mullPanel'); l.innerHTML = '';
                s.forEach(c => { l.innerHTML += `<div class="card-dark p-4 flex justify-between items-center text-[11px] font-bold"><span>📍 ${c.val().station} - ${c.val().detail}</span><button onclick="database.ref('mull_pozivi/${c.key}').remove()" class="btn-minimal px-3 py-1 uppercase">Erledigt</button></div>`; });
            });
        }

        async function updateGlobalState() {
            const snap = await database.ref('timers').once('value'); const t = snap.val() || {};
            freeMachines = 0; for(let i=1; i<=3; i++) { if(!t['m'+i]) freeMachines++; }
            const bar = document.getElementById('auto-notify'); const msg = document.getElementById('notify-msg'); const sub = document.getElementById('notify-sub'); const box = document.getElementById('notify-box'); const btn = document.getElementById('btn-rundgang');

            if(currentCount >= 3) {
                bar.classList.remove('hidden');
                const needsTwo = currentCount >= 6;
                const canStart = needsTwo ? (freeMachines >= 2) : (freeMachines >= 1);
                if(needsTwo) {
                    msg.innerText = `🚨 WAGEN VOLL (${currentCount}/6)`;
                    if(freeMachines < 2) {
                        sub.innerText = `STOPP: 2 freie Maschinen benötigt! (Aktuell: ${freeMachines})`;
                        box.className = "p-4 flex flex-col md:flex-row justify-between items-center rounded gap-4 border-2 border-red-500 bg-red-900/20";
                        btn.disabled = true;
                    } else {
                        sub.innerText = `${freeMachines} Maschinen frei. Rundgang OK!`;
                        box.className = "p-4 flex flex-col md:flex-row justify-between items-center rounded gap-4 border-2 border-hellgruen bg-hellgruen/10";
                        btn.disabled = false;
                    }
                } else {
                    msg.innerText = `🧺 1 MASCHINE VOLL (${currentCount}/6)`;
                    if(freeMachines < 1) {
                        sub.innerText = `WARTEN: Alle Maschinen besetzt!`;
                        box.className = "p-4 flex flex-col md:flex-row justify-between items-center rounded gap-4 border-2 border-red-500 bg-red-900/20";
                        btn.disabled = true;
                    } else {
                        sub.innerText = `1 Maschine frei. Rundgang OK!`;
                        box.className = "p-4 flex flex-col md:flex-row justify-between items-center rounded gap-4 border-2 border-warn-gelb bg-warn-gelb/10 text-warn-gelb";
                        btn.disabled = false;
                    }
                }
            } else { bar.classList.add('hidden'); }
        }

        function startRundgang() { database.ref('ves_pozivi').remove(); }
        function startMachine(id) { database.ref('timers/m'+id).set({ endTime: Date.now()+(80*60*1000) }); }
        function finishMachine(id) { database.ref('timers/m'+id).remove(); }
        function sendWash() { const n = document.getElementById('userNotiz').value; const u = document.getElementById('isUrgent').checked; database.ref('ves_pozivi/'+Date.now()).set({ station: userConfig.station, notiz: n, urgent: u }); document.getElementById('userNotiz').value = ""; document.getElementById('isUrgent').checked = false; }
        function quickMull(d) { database.ref('mull_pozivi/'+Date.now()).set({ station: userConfig.station, detail: d }); }
    </script>
</body>
</html>
