<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>FLUXS | Operations Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fluxs-orange { background-color: #ff4f00; }
        .text-fluxs-orange { color: #ff4f00; }
        .urgent-alert { animation: shadow-pulse 1.5s infinite; border: 2px solid #ff4f00 !important; }
        @keyframes shadow-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 79, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 79, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 79, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="loginScreen" class="fixed inset-0 bg-[#0f172a] z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 md:p-12 rounded-[40px] shadow-2xl max-w-md w-full text-center">
            <img src="https://www.fluxs.de/wp-content/uploads/2019/12/Logo_Fluxs_White.png" alt="FLUXS" class="h-10 mx-auto mb-8 invert">
            <h2 class="text-2xl font-black mb-6 tracking-tight">TEAM LOGIN</h2>
            
            <input type="text" id="userName" placeholder="Dein Name" class="w-full p-4 bg-slate-100 border-2 border-transparent rounded-2xl mb-6 focus:border-fluxs-orange outline-none text-center font-bold text-lg">
            
            <div class="text-left space-y-3 mb-8">
                <p class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Zusatzrollen (Optional)</p>
                <label class="flex items-center p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-orange-50 transition-colors">
                    <input type="checkbox" id="checkWesche" class="w-5 h-5 accent-[#ff4f00]">
                    <span class="ml-3 font-bold text-slate-700">Wäschedienst 🧺</span>
                </label>
                <label class="flex items-center p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-orange-50 transition-colors">
                    <input type="checkbox" id="checkMull" class="w-5 h-5 accent-[#ff4f00]">
                    <span class="ml-3 font-bold text-slate-700">Mülldienst 🗑️</span>
                </label>
                <label class="flex items-center p-3 bg-slate-50 rounded-xl cursor-pointer hover:bg-orange-50 transition-colors">
                    <input type="checkbox" id="checkBoden" class="w-5 h-5 accent-[#ff4f00]">
                    <span class="ml-3 font-bold text-slate-700">Bodendienst 🧹</span>
                </label>
            </div>

            <button onclick="doLogin()" class="fluxs-orange w-full text-white font-black py-5 rounded-2xl shadow-lg hover:brightness-110 transition-all text-xl uppercase">
                Dashboard öffnen
            </button>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-[#0f172a] text-white p-4 shadow-xl border-b border-fluxs-orange/30">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <img src="https://fluxs.de/wp-content/uploads/2023/10/Fluxs-Logo-White.svg" alt="FLUXS" class="h-8">
                <div class="flex items-center gap-4 text-xs font-bold uppercase tracking-widest">
                    <span id="displayUser" class="text-slate-400">User: -</span>
                    <div id="washingTimer" class="bg-white/5 px-3 py-1 rounded-full border border-white/10 text-orange-400">
                        WASCHMASCHINE: 90:00
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 italic">Arbeitsstation</h2>
                <input type="text" id="wsNumber" placeholder="Station #" class="w-full text-4xl font-black p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl mb-6 focus:border-fluxs-orange outline-none">
                
                <div class="space-y-4">
                    <input type="text" id="washType" placeholder="Was wird gewaschen? (z.B. Babytrage)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl">
                    <button onclick="sendAlert('ves_pozivi', 'KORB')" class="fluxs-orange w-full text-white font-black py-6 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 text-xl uppercase">🧺 Korb Voll</button>
                    <button onclick="sendAlert('mull_pozivi', 'MÜLL')" class="bg-slate-800 w-full text-white font-black py-4 rounded-2xl shadow-md hover:bg-slate-900 active:scale-95 text-sm uppercase mt-4">🗑️ Müll abholen</button>
                </div>
            </div>

            <div class="lg:col-span-7 space-y-6">
                <div id="weschePanel" class="bg-white p-8 rounded-3xl shadow-sm border-t-8 border-fluxs-orange hidden">
                    <h2 class="text-xl font-black uppercase mb-6 text-slate-800">Wäsche Logistik Live</h2>
                    <div id="wescheList" class="space-y-4"></div>
                </div>
                <div id="mullPanel" class="bg-white p-8 rounded-3xl shadow-sm border-t-8 border-slate-800 hidden">
                    <h2 class="text-xl font-black uppercase mb-6 text-slate-800">Müll Entsorgung Live</h2>
                    <div id="mullList" class="space-y-4"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="bodenModal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md flex items-center justify-center hidden z-[200]">
        <div class="bg-white p-12 rounded-[40px] text-center max-w-lg shadow-2xl border-b-[12px] border-fluxs-orange">
            <h2 class="text-4xl font-black mb-4 text-slate-900 uppercase">Bodendienst</h2>
            <p class="text-slate-500 mb-8 font-bold italic text-xl">14:00 Uhr - Ist die Werkstatt sauber?</p>
            <button onclick="closeBoden()" class="fluxs-orange text-white px-12 py-5 rounded-2xl text-xl font-black hover:brightness-110 w-full shadow-xl">ERLEDIGT ✅</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ",
  databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", 
  authDomain: "dienste-fluxs.firebaseapp.com",
  projectId: "dienste-fluxs",
  storageBucket: "dienste-fluxs.firebasestorage.app",
  messagingSenderId: "137594684055",
  appId: "1:137594684055:web:2e2ddc1ed5ce8ff8f6dfd2"
};
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userConfig = { name: "", wesche: false, mull: false, boden: false };
        let alertInterval = null;

        function doLogin() {
            const name = document.getElementById('userName').value;
            if(!name) return alert("Bitte Name eingeben!");
            
            userConfig = {
                name: name,
                wesche: document.getElementById('checkWesche').checked,
                mull: document.getElementById('checkMull').checked,
                boden: document.getElementById('checkBoden').checked
            };

            document.getElementById('displayUser').innerText = `User: ${name}`;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');

            if(userConfig.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(userConfig.mull) document.getElementById('mullPanel').classList.remove('hidden');
        }

        function sendAlert(path, type) {
            const ws = document.getElementById('wsNumber').value;
            if(!ws) return alert("Station #?");
            const detail = type === 'KORB' ? document.getElementById('washType').value : 'Abfall';
            
            database.ref(path + '/' + ws).set({
                station: ws,
                detail: detail || 'Standard',
                sender: userConfig.name,
                time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'})
            });
        }

        database.ref('ves_pozivi/').on('value', (s) => renderList(s, 'wescheList', 'ves_pozivi', userConfig.wesche));
        database.ref('mull_pozivi/').on('value', (s) => renderList(s, 'mullList', 'mull_pozivi', userConfig.mull));

        function renderList(snapshot, elementId, path, hasRole) {
            const container = document.getElementById(elementId);
            container.innerHTML = '';
            if(snapshot.val()) {
                if(hasRole) startAlarm();
                snapshot.forEach(child => {
                    const item = child.val();
                    container.innerHTML += `
                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 flex justify-between items-center ${hasRole ? 'urgent-alert' : ''}">
                            <div>
                                <p class="text-[10px] font-black text-fluxs-orange uppercase">Station ${item.station} (${item.time})</p>
                                <p class="text-xl font-black text-slate-800 uppercase">${item.detail}</p>
                                <p class="text-[10px] text-slate-400 font-bold">Meldung von: ${item.sender}</p>
                            </div>
                            <button onclick="removeItem('${path}', '${item.station}')" class="bg-slate-900 text-white px-6 py-4 rounded-xl font-black text-xs hover:bg-green-600 transition-all">OK</button>
                        </div>`;
                });
            } else { stopAlarm(); container.innerHTML = '<p class="text-slate-300 italic">Warten auf Anfragen...</p>'; }
        }

        function removeItem(p, id) { database.ref(p + '/' + id).remove(); }
        function startAlarm() { if(!alertInterval) { new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play(); alertInterval = setInterval(() => { document.title = document.title.includes("🚨") ? "FLUXS OPS" : "🚨 NEU"; }, 500); } }
        function stopAlarm() { clearInterval(alertInterval); alertInterval = null; document.title = "FLUXS OPS"; }

        setInterval(() => {
            const n = new Date();
            if(userConfig.boden && n.getHours() === 14 && n.getMinutes() === 0) document.getElementById('bodenModal').classList.remove('hidden');
        }, 60000);
        function closeBoden() { document.getElementById('bodenModal').classList.add('hidden'); }
    </script>
</body>
</html>
