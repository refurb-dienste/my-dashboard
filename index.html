<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aufbereitung-Dienst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace !important; background-color: #f4f7f4; }
        .dringend-alert { animation: pulse 0.8s infinite; border-left: 8px solid #ef4444 !important; background-color: #fef2f2 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .timer-finished { background-color: #ef4444 !important; color: white !important; border: 3px solid black !important; animation: blinkRed 1s infinite; }
        @keyframes blinkRed { 0% { background-color: #ef4444; } 50% { background-color: #7f1d1d; } 100% { background-color: #ef4444; } }
        .dark-green-gradient { background: linear-gradient(135deg, #1a3c34 0%, #0d211d 100%); }
        .coach-msg { transition: all 0.5s ease; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        button:disabled { background: #cbd5e1 !important; color: #94a3b8 !important; cursor: not-allowed !important; transform: none !important; }
    </style>
</head>
<body class="min-h-screen text-slate-900 pb-10">

    <div id="sendFeedback" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-[#1a3c34] text-white px-8 py-4 rounded-full z-[300] font-black uppercase shadow-2xl border-2 border-white text-center"></div>

    <div id="loginScreen" class="fixed inset-0 bg-[#1a3c34] z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-md w-full text-center border-b-[15px] border-emerald-900">
            <h1 class="text-4xl font-extrabold mb-8 uppercase italic tracking-tighter text-slate-800">AUFBEREITUNG</h1>
            <div class="space-y-4 text-left">
                <input type="text" id="userName" placeholder="DEIN NAME" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl outline-none focus:border-[#1a3c34] font-bold uppercase text-sm">
                <select id="userStation" class="w-full bg-slate-50 border-2 border-slate-200 p-4 rounded-xl font-bold uppercase cursor-pointer text-sm">
                    <option value="wks050">wks050</option><option value="wks051">wks051</option><option value="wks052">wks052</option>
                    <option value="wks053">wks053</option><option value="wks054">wks054</option><option value="wks055">wks055</option>
                    <option value="wks056">wks056</option><option value="wks057">wks057</option><option value="wks058">wks058</option><option value="wks059">wks059</option>
                </select>
                <div class="grid grid-cols-1 gap-3 mt-6">
                    <label class="flex items-center p-4 bg-slate-50 border-2 border-slate-100 rounded-xl cursor-pointer hover:bg-emerald-50 transition-colors"><input type="checkbox" id="checkWesche" class="w-6 h-6 accent-[#1a3c34]"><span class="ml-4 uppercase text-xs font-extrabold tracking-wider">Wäschedienst</span></label>
                    <label class="flex items-center p-4 bg-slate-50 border-2 border-slate-100 rounded-xl cursor-pointer hover:bg-emerald-50 transition-colors"><input type="checkbox" id="checkMull" class="w-6 h-6 accent-[#1a3c34]"><span class="ml-4 uppercase text-xs font-extrabold tracking-wider">Müll-Dienst</span></label>
                    <label class="flex items-center p-4 bg-slate-50 border-2 border-slate-100 rounded-xl cursor-pointer hover:bg-emerald-50 transition-colors"><input type="checkbox" id="checkBoden" class="w-6 h-6 accent-[#1a3c34]"><span class="ml-4 uppercase text-xs font-extrabold tracking-wider">Bodendienst</span></label>
                </div>
                <button onclick="doLogin()" class="w-full dark-green-gradient text-white p-5 rounded-2xl uppercase font-black mt-6 shadow-xl text-2xl hover:scale-[1.02] transition-transform tracking-widest">START</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="bg-white/80 backdrop-blur-md border-b-4 border-[#1a3c34] p-4 sticky top-0 z-50 shadow-lg">
            <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 dark-green-gradient text-white flex items-center justify-center text-2xl font-black rounded-2xl shadow-lg">A</div>
                    <div><h1 class="font-extrabold text-2xl uppercase italic tracking-tighter text-slate-800">AUFBEREITUNG</h1><p id="displayUser" class="text-[10px] text-emerald-700 font-black uppercase tracking-widest"></p></div>
                </div>
                <div class="flex flex-wrap items-center gap-2 dark-green-gradient p-3 rounded-2xl shadow-2xl text-white">
                    <span id="activeStationDisplay" class="bg-white px-4 py-2 text-[#1a3c34] text-xs font-black rounded-lg shadow-inner"></span>
                    <button onclick="quickMull('Restmüll 🗑️')" class="bg-slate-700/50 px-3 py-2 text-[10px] uppercase font-black rounded-lg hover:bg-black transition-colors">Restmüll</button>
                    <button onclick="quickMull('Papier 📄')" class="bg-blue-800/50 px-3 py-2 text-[10px] uppercase font-black rounded-lg hover:bg-blue-900 transition-colors">Papier</button>
                    <button onclick="sendWash()" class="bg-white text-[#1a3c34] px-5 py-2 uppercase text-xs font-black italic rounded-lg hover:bg-emerald-50 shadow-md">🧺 KORB VOLL</button>
                    <input type="text" id="userNotiz" placeholder="NOTIZ..." class="p-2 text-xs uppercase text-slate-900 w-28 font-bold rounded-lg outline-none">
                    <label class="flex items-center text-[10px] uppercase font-black px-2 cursor-pointer"><input type="checkbox" id="isUrgent" class="mr-2 w-4 h-4 accent-red-500"> DRINGEND!</label>
                </div>
                <div id="liveStatus" class="bg-slate-100 p-3 text-[9px] uppercase border-2 border-slate-200 rounded-xl min-w-[200px] max-h-24 overflow-y-auto"><div id="statusList" class="space-y-1"></div></div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div id="weschePanel" class="hidden space-y-8">
                <div id="notizMonitor" class="bg-yellow-100 border-4 border-yellow-400 p-5 rounded-2xl shadow-xl hidden"><div id="notizList" class="flex flex-wrap gap-3"></div></div>

                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                    <div class="lg:col-span-2 bg-white p-6 rounded-3xl border-t-8 border-slate-300 shadow-md">
                        <h3 class="text-xs uppercase font-black mb-6 tracking-widest text-slate-400 flex justify-between">OFFENE KÖRBE <span id="openCount" class="text-slate-800">0</span></h3>
                        <div id="wescheList" class="space-y-3"></div>
                    </div>

                    <div class="lg:col-span-1 bg-white p-6 rounded-3xl border-t-8 border-[#1a3c34] shadow-2xl relative flex flex-col">
                        <h3 class="text-xs uppercase font-black mb-1 text-emerald-800 italic">Dein Wagen</h3>
                        <div id="efficiency-status" class="coach-msg text-[10px] uppercase font-black p-4 mb-4 rounded-xl text-center border shadow-inner min-h-[60px] flex items-center justify-center">Lade Körbe ein...</div>
                        
                        <div id="myCartList" class="space-y-3 flex-grow"></div>
                        <div class="mt-6 space-y-2">
                            <button onclick="fillMyCart()" class="w-full bg-emerald-100 text-[#1a3c34] py-3 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-200 transition-all">Körbe einladen 🧺</button>
                            <button id="btn-clear-cart" onclick="clearMyCartAuto()" class="w-full dark-green-gradient text-white py-4 rounded-xl text-xs uppercase font-extrabold hover:scale-95 transition-all shadow-lg">Wagen leeren & Start ✔️</button>
                            <p id="lock-msg" class="text-[9px] text-red-500 font-bold uppercase text-center hidden italic">Keine Maschine frei!</p>
                        </div>
                    </div>

                    <div class="lg:col-span-1 space-y-4">
                        <h3 class="text-xs uppercase font-black text-slate-400 tracking-widest text-center italic">Maschinen-Status</h3>
                        <div id="timer-box-1" class="bg-white p-4 rounded-2xl border-b-4 border-slate-200 shadow-md text-center"><p class="text-[9px] font-black uppercase text-slate-400">Maschine 1</p><div id="timer-val-1" class="text-2xl font-black my-2 tracking-tighter">BEREIT</div><div id="machine-actions-1"></div></div>
                        <div id="timer-box-2" class="bg-white p-4 rounded-2xl border-b-4 border-slate-200 shadow-md text-center"><p class="text-[9px] font-black uppercase text-slate-400">Maschine 2</p><div id="timer-val-2" class="text-2xl font-black my-2 tracking-tighter">BEREIT</div><div id="machine-actions-2"></div></div>
                        <div id="timer-box-3" class="bg-white p-4 rounded-2xl border-b-4 border-slate-200 shadow-md text-center"><p class="text-[9px] font-black uppercase text-slate-400">Maschine 3</p><div id="timer-val-3" class="text-2xl font-black my-2 tracking-tighter">BEREIT</div><div id="machine-actions-3"></div></div>
                    </div>
                </div>
            </div>

            <div id="mullPanel" class="hidden bg-white p-8 rounded-3xl border-l-[12px] border-slate-800 shadow-xl max-w-2xl"><div id="mullList" class="space-y-3"></div></div>
        </main>
    </div>

    <div id="bodenModal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-[200]">
        <div class="bg-white p-16 text-center max-w-xl rounded-[40px] border-b-[20px] border-[#1a3c34] shadow-2xl">
            <h2 class="text-5xl font-black mb-6 uppercase italic">BODENDIENST</h2>
            <button onclick="closeBoden()" class="dark-green-gradient text-white px-16 py-6 rounded-2xl text-2xl font-black shadow-2xl">ERLEDIGT ✅</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ",
            databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", 
            authDomain: "dienste-fluxs.firebaseapp.com",
            projectId: "dienste-fluxs",
            storageBucket: "dienste-fluxs.firebasestorage.app",
            messagingSenderId: "137594684055",
            appId: "1:137594684055:web:2e2ddc1ed5ce8ff8f6dfd2"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userConfig = { name: "", station: "", wesche: false, mull: false, boden: false };
        let activeIntervals = { 1: null, 2: null, 3: null };
        let currentCartCount = 0;
        let stats = { wCount: 0, mCount: 0, bodenAktiv: false };
        let lastStats = { wCount: 0, mCount: 0 };

        function doLogin() {
            const n = document.getElementById('userName').value;
            const s = document.getElementById('userStation').value;
            if(!n) return alert("NAME?");
            userConfig = { name: n, station: s, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked, boden: document.getElementById('checkBoden').checked };
            const onlineRef = database.ref('online_users/' + n + '_' + s);
            onlineRef.set(userConfig); onlineRef.onDisconnect().remove();
            document.getElementById('displayUser').innerText = `MA: ${n} | ${s}`;
            document.getElementById('activeStationDisplay').innerText = s;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            if(userConfig.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(userConfig.mull) document.getElementById('mullPanel').classList.remove('hidden');
            syncTimers(); listenToOnlineUsers();
            if(userConfig.boden) startBodenCheck();
            startResetCheck();
        }

        function syncTimers() {
            [1, 2, 3].forEach(id => {
                database.ref('timers/m' + id).on('value', (s) => {
                    const d = s.val();
                    const box = document.getElementById('timer-box-' + id);
                    const val = document.getElementById('timer-val-' + id);
                    const act = document.getElementById('machine-actions-' + id);
                    if(activeIntervals[id]) clearInterval(activeIntervals[id]);
                    box.className = "bg-white p-4 rounded-2xl border-b-4 border-slate-200 shadow-md text-center";
                    act.innerHTML = "";
                    if(!d) { val.textContent = "BEREIT"; checkFreeMachines(); return; }
                    if(d.status === 'waschen') {
                        activeIntervals[id] = setInterval(() => {
                            const diff = d.endTime - Date.now();
                            if(diff <= 0) { clearInterval(activeIntervals[id]); val.textContent = "WASCHEN FERTIG!"; box.classList.add('timer-finished');
                            act.innerHTML = `<button onclick="moveToDryer(${id})" class="w-full bg-blue-600 text-white p-2 rounded-lg text-[9px] font-black uppercase animate-bounce">➔ Trockner</button>`;
                            } else { const t = Math.floor(diff/1000); const m = Math.floor(t/60); const sec = t%60; val.textContent = (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec; }
                            checkFreeMachines();
                        }, 1000);
                    } else {
                        box.classList.add('bg-blue-50', 'border-blue-300'); val.innerHTML = `<span class="text-blue-600">TROCKNEN</span>`;
                        act.innerHTML = `<button onclick="finishMachine(${id})" class="w-full bg-emerald-600 text-white p-2 rounded-lg text-[9px] font-black uppercase">Lager ✔️</button>`;
                        checkFreeMachines();
                    }
                });
            });
        }

        function checkFreeMachines() {
            database.ref('timers').once('value', s => {
                const t = s.val() || {};
                let free = 0; for(let i=1; i<=3; i++) { if(!t['m'+i]) free++; }
                updateCoachMessage(currentCartCount, free);
            });
        }

        function updateCoachMessage(cart, free) {
            const el = document.getElementById('efficiency-status');
            const btn = document.getElementById('btn-clear-cart');
            const lock = document.getElementById('lock-msg');
            let msg = "Wagen ist leer. Lade Körbe ein!";
            let style = "bg-slate-50 text-slate-400 border-slate-200";

            if (cart > 0 && cart < 3) { msg = `Wagen füllt sich (${cart}/6)...`; style = "bg-emerald-50 text-emerald-700 border-emerald-200 font-bold"; }
            else if (cart >= 3 && cart < 6) {
                if (free >= 1) { msg = `Klasse! ${cart} Körbe gesammelt – du könntest jetzt schon eine Maschine starten! 🌀`; style = "bg-blue-50 text-blue-800 border-blue-200 font-black animate-pulse"; }
                else { msg = `${cart} Körbe bereit. Maschinen sind aber noch voll.`; style = "bg-yellow-50 text-yellow-700 border-yellow-200"; }
            }
            else if (cart >= 6) {
                if (free >= 2) { msg = `Spitze! Dein Wagen ist voll und 2 Maschinen warten auf dich! Ab geht's! 🚀🏆`; style = "bg-emerald-600 text-white border-white font-black shadow-xl scale-105"; }
                else if (free === 1) { msg = `Wagen ist voll! Eine Maschine ist bereit für dich! 🏃💨`; style = "bg-emerald-500 text-white border-white font-black"; }
                else { msg = `Wagen ist voll! Aber die Maschinen brauchen noch kurz. Verschnaufpause! ☕`; style = "bg-red-50 text-red-600 border-red-200 font-black"; }
            }

            el.innerText = msg; el.className = `coach-msg text-[10px] uppercase font-black p-4 mb-4 rounded-xl text-center border shadow-inner min-h-[60px] flex items-center justify-center ${style}`;
            btn.disabled = (free === 0 || cart === 0);
            lock.classList.toggle('hidden', free > 0);
        }

        async function clearMyCartAuto() {
            const snap = await database.ref('timers').once('value');
            const t = snap.val() || {};
            let mid = null; for(let i=1; i<=3; i++) { if(!t['m'+i]) { mid=i; break; } }
            if(mid) {
                database.ref('timers/m'+mid).set({ endTime: Date.now()+(80*60*1000), status: 'waschen', startedBy: userConfig.name });
                database.ref('ves_pozivi').once('value', s => { s.forEach(c => { if(c.val().seenBy === userConfig.name) c.ref.remove(); }); });
                showFeedback("MASCHINE " + mid + " LÄUFT! 🌀");
            }
        }

        function moveToDryer(id) { database.ref('timers/m'+id).update({ status: 'trocknen' }); }
        function finishMachine(id) { database.ref('timers/m'+id).remove(); }
        function showFeedback(txt) { const fb = document.getElementById('sendFeedback'); fb.innerText = txt; fb.classList.remove('hidden'); setTimeout(() => fb.classList.add('hidden'), 2500); }
        function fillMyCart() { database.ref('ves_pozivi').once('value', s => { let c=0; s.forEach(x => { if(x.val().seenBy === userConfig.name) c++; }); s.forEach(x => { if(!x.val().seenBy && c<6) { database.ref('ves_pozivi/'+x.key).update({seenBy:userConfig.name}); c++; } }); }); }
        function sendWash() { const n = document.getElementById('userNotiz').value; const u = document.getElementById('isUrgent').checked; database.ref('ves_pozivi/'+Date.now()).set({ station: userConfig.station, notiz: n, urgent: u, sender: userConfig.name, time: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}), seenBy: "" }); document.getElementById('isUrgent').checked=false; document.getElementById('userNotiz').value=""; showFeedback("GESENDET! ✅"); }
        function quickMull(t) { database.ref('mull_pozivi/'+Date.now()).set({ station: userConfig.station, detail: t, sender: userConfig.name, time: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}), seen: false }); }
        function updateTabNotification() { let l = ""; const w = userConfig.wesche && stats.wCount > lastStats.wCount; const m = userConfig.mull && stats.mCount > lastStats.mCount; if(w||m) l="!! NEU !!"; else if(stats.bodenAktiv) l="!! BODEN !!"; if(l!=="") { document.title=l; new Audio('https://actions.google.com/sounds/v1/alerts/minimal_effects_bell_ring.ogg').play().catch(()=>{}); } else { document.title="Aufbereitung-Dienst"; } }

        database.ref('ves_pozivi/').on('value', (s) => {
            const ml = document.getElementById('wescheList'); const mc = document.getElementById('myCartList');
            const nm = document.getElementById('notizMonitor'); const nl = document.getElementById('notizList');
            ml.innerHTML=''; mc.innerHTML=''; nl.innerHTML='';
            let cart=0; let open=0; let hasN=false;
            s.forEach(c => {
                const i = c.val(); const k = c.key;
                if(i.notiz && (!i.seenBy || i.seenBy === userConfig.name)) { hasN=true; nl.innerHTML += `<div class="bg-white border-2 border-yellow-500 px-3 py-1 rounded-xl text-[9px] font-black uppercase">${i.station}: ${i.notiz}</div>`; }
                const card = `<div class="bg-slate-50 p-3 rounded-2xl border-l-4 border-[#1a3c34] flex justify-between items-center ${i.urgent && !i.seenBy ? 'dringend-alert' : ''}"><div><p class="font-black text-xs">${i.station}</p></div><div class="flex gap-2">${!i.seenBy ? `<button onclick="database.ref('ves_pozivi/${k}').update({seenBy:userConfig.name})" class="bg-emerald-100 text-emerald-900 px-3 py-2 rounded-xl font-black text-[9px]">HOLEN</button>` : `<button onclick="database.ref('ves_pozivi/${k}').remove()" class="bg-slate-200 px-3 py-2 rounded-xl text-[9px] font-black">X</button>`}</div></div>`;
                if(!i.seenBy) { ml.innerHTML += card; open++; } else if(i.seenBy === userConfig.name) { mc.innerHTML += card; cart++; }
            });
            stats.wCount=open; updateTabNotification(); lastStats.wCount=open;
            document.getElementById('openCount').innerText=open; currentCartCount=cart; nm.classList.toggle('hidden', !hasN); checkFreeMachines();
        });

        database.ref('mull_pozivi/').on('value', (s) => {
            const l = document.getElementById('mullList'); l.innerHTML=''; let count=0;
            s.forEach(c => { count++; l.innerHTML += `<div class="bg-slate-50 p-4 rounded-2xl border-l-8 border-slate-800 flex justify-between items-center shadow-md"><div><p class="font-black text-sm uppercase">${c.val().station}</p><p class="text-[10px] font-bold text-slate-400 italic">${c.val().detail}</p></div><button onclick="database.ref('mull_pozivi/${c.key}').remove()" class="bg-black text-white px-5 py-3 rounded-xl text-[10px] font-black">OK ✔️</button></div>`; });
            stats.mCount=count; updateTabNotification(); lastStats.mCount=count;
        });

        function listenToOnlineUsers() { database.ref('online_users').on('value', (s) => { const l = document.getElementById('statusList'); l.innerHTML=''; if(!s.val()) return; Object.values(s.val()).forEach(u => { l.innerHTML += `<div class="flex justify-between text-[8px] font-bold border-b pb-1"><span>${u.name} (${u.station})</span> <span class="text-emerald-600">online</span></div>`; }); }); }
        function startBodenCheck() { setInterval(() => { const t = new Intl.DateTimeFormat('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }).format(new Date()); if(t === "14:00") { document.getElementById('bodenModal').classList.remove('hidden'); stats.bodenAktiv = true; updateTabNotification(); } }, 60000); }
        function closeBoden() { document.getElementById('bodenModal').classList.add('hidden'); stats.bodenAktiv = false; updateTabNotification(); }
        function startResetCheck() { setInterval(() => { const t = new Intl.DateTimeFormat('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }).format(new Date()); if(t === "20:00") { database.ref('ves_pozivi').remove(); database.ref('mull_pozivi').remove(); database.ref('timers').remove(); } }, 60000); }
    </script>
</body>
</html>
