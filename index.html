<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refurb-Logistik Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; font-weight: bold; background-color: #f0f4f0; }
        .urgent-alert { animation: pulse 2s infinite; }
        .dringend-alert { animation: pulse 0.8s infinite; border-left-color: #ef4444 !important; background-color: #fef2f2 !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .timer-finished { background-color: #ef4444 !important; color: white !important; animation: pulse 1s infinite; border: 2px solid black !important; }
        .eff-full { background-color: #dc2626; color: white; animation: pulse 0.5s infinite; }
        .feedback-pop { animation: slideUp 2s forwards; }
        @keyframes slideUp { 0% { opacity:0; transform:translateY(10px); } 10% { opacity:1; transform:translateY(0); } 90% { opacity:1; } 100% { opacity:0; } }
    </style>
</head>
<body class="min-h-screen text-slate-900">

    <div id="sendFeedback" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full z-[300] font-black uppercase shadow-2xl feedback-pop">
        Gesendet! ✅
    </div>

    <div id="loginScreen" class="fixed inset-0 bg-[#1a3c34] z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-none shadow-2xl max-w-md w-full text-center border-b-[12px] border-[#1a3c34]">
            <h1 class="text-3xl font-black mb-6 uppercase italic">Aufbereitung</h1>
            <div class="space-y-4 text-left">
                <input type="text" id="userName" placeholder="DEIN NAME" class="w-full bg-slate-100 border-2 border-slate-200 p-4 outline-none focus:border-[#1a3c34]">
                <select id="userStation" class="w-full bg-slate-100 border-2 border-slate-200 p-4 font-bold uppercase">
                    <option value="wks050">wks050</option><option value="wks051">wks051</option><option value="wks052">wks052</option>
                    <option value="wks053">wks053</option><option value="wks054">wks054</option><option value="wks055">wks055</option>
                    <option value="wks056">wks056</option><option value="wks057">wks057</option><option value="wks058">wks058</option><option value="wks059">wks059</option>
                </select>
                <div class="grid grid-cols-1 gap-2 mt-4">
                    <label class="flex items-center p-3 bg-slate-50 border cursor-pointer"><input type="checkbox" id="checkWesche" class="w-5 h-5 accent-[#1a3c34]"><span class="ml-4 uppercase text-[11px] font-black">Wäschedienst</span></label>
                    <label class="flex items-center p-3 bg-slate-50 border cursor-pointer"><input type="checkbox" id="checkMull" class="w-5 h-5 accent-[#1a3c34]"><span class="ml-4 uppercase text-[11px] font-black">Müll-Dienst</span></label>
                    <label class="flex items-center p-3 bg-slate-50 border cursor-pointer"><input type="checkbox" id="checkBoden" class="w-5 h-5 accent-[#1a3c34]"><span class="ml-4 uppercase text-[11px] font-black">Bodendienst</span></label>
                </div>
                <button onclick="doLogin()" class="w-full bg-[#1a3c34] text-white p-5 uppercase font-black mt-4 shadow-lg text-xl hover:bg-black">Start</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="bg-white border-b-4 border-[#1a3c34] p-4 sticky top-0 z-50 shadow-md">
            <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-[#1a3c34] text-white flex items-center justify-center text-xl font-black italic">A</div>
                    <div><h1 class="font-black text-xl uppercase italic">Aufbereitung</h1><p id="displayUser" class="text-[10px] text-[#1a3c34] font-bold uppercase"></p></div>
                </div>
                
                <div class="flex flex-wrap items-center gap-2 bg-[#1a3c34] p-3 shadow-xl text-white">
                    <span id="activeStationDisplay" class="bg-white px-3 py-2 text-[#1a3c34] text-xs font-black"></span>
                    <button onclick="quickMull('Restmüll 🗑️')" class="bg-slate-700 px-3 py-2 text-[10px] uppercase font-black">Restmüll</button>
                    <button onclick="quickMull('Papier 📄')" class="bg-blue-700 px-3 py-2 text-[10px] uppercase font-black">Papier</button>
                    <button onclick="sendWash()" class="bg-white text-[#1a3c34] px-4 py-2 uppercase text-xs font-black italic">🧺 Wäschekorb voll</button>
                    <input type="text" id="userNotiz" placeholder="NOTIZ" class="p-2 text-xs uppercase text-slate-900 w-32 font-bold outline-none">
                    <label class="flex items-center text-[10px] uppercase font-black"><input type="checkbox" id="isUrgent" class="mr-1 accent-red-500"> Dringend</label>
                </div>

                <div id="liveStatus" class="bg-slate-100 p-2 text-[9px] uppercase border border-slate-200 min-w-[200px] max-h-32 overflow-y-auto">
                    <p class="font-black border-b border-slate-300 mb-1">Status & Wagen:</p>
                    <div id="statusList" class="space-y-1"></div>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div id="weschePanel" class="hidden space-y-8">
                <div id="notizMonitor" class="bg-yellow-50 border-4 border-yellow-400 p-4 hidden">
                    <h3 class="text-xs font-black uppercase mb-2 text-yellow-700 underline">⚠️ Sonderwünsche / Notizen:</h3>
                    <div id="notizList" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div class="lg:col-span-2 bg-white p-4 border-t-4 border-slate-400">
                        <h3 class="text-xs uppercase font-black mb-4 tracking-widest text-slate-400">Offene Anfragen (Halle)</h3>
                        <div id="wescheList" class="space-y-2"></div>
                    </div>

                    <div class="lg:col-span-1 bg-white p-4 border-t-4 border-blue-500 shadow-lg">
                        <h3 class="text-xs uppercase font-black mb-1 text-blue-600">Mein Einkaufskorb</h3>
                        <div id="efficiency-status" class="text-[9px] uppercase font-black p-2 mb-2 bg-slate-100 text-center">Leer</div>
                        <div id="myCartList" class="space-y-2"></div>
                        <button onclick="clearMyCart()" class="w-full mt-4 bg-blue-600 text-white py-2 text-[10px] uppercase font-black hover:bg-black">Wagen leeren ✔️</button>
                    </div>

                    <div class="lg:col-span-1 space-y-4">
                        <h3 class="text-xs uppercase font-black text-slate-400">Waschturm</h3>
                        <div id="timer-box-1" class="bg-white p-4 border-t-4 border-slate-200 text-center">
                            <p class="text-[9px] uppercase">Maschine 1</p><div id="timer-val-1" class="text-2xl font-black mb-2">80:00</div>
                            <div class="flex gap-1"><button id="btn-start-1" onclick="triggerTimer(1)" class="flex-1 bg-[#1a3c34] text-white py-2 text-[10px] font-black uppercase">Start</button>
                            <button id="btn-clear-1" onclick="clearTimer(1)" class="hidden flex-1 bg-black text-white py-2 text-[10px] font-black uppercase">Leeren</button></div>
                        </div>
                        <div id="timer-box-2" class="bg-white p-4 border-t-4 border-slate-200 text-center">
                            <p class="text-[9px] uppercase">Maschine 2</p><div id="timer-val-2" class="text-2xl font-black mb-2">80:00</div>
                            <div class="flex gap-1"><button id="btn-start-2" onclick="triggerTimer(2)" class="flex-1 bg-[#1a3c34] text-white py-2 text-[10px] font-black uppercase">Start</button>
                            <button id="btn-clear-2" onclick="clearTimer(2)" class="hidden flex-1 bg-black text-white py-2 text-[10px] font-black uppercase">Leeren</button></div>
                        </div>
                        <div id="timer-box-3" class="bg-white p-4 border-t-4 border-slate-200 text-center">
                            <p class="text-[9px] uppercase">Maschine 3</p><div id="timer-val-3" class="text-2xl font-black mb-2">80:00</div>
                            <div class="flex gap-1"><button id="btn-start-3" onclick="triggerTimer(3)" class="flex-1 bg-[#1a3c34] text-white py-2 text-[10px] font-black uppercase">Start</button>
                            <button id="btn-clear-3" onclick="clearTimer(3)" class="hidden flex-1 bg-black text-white py-2 text-[10px] font-black uppercase">Leeren</button></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="mullPanel" class="hidden bg-white p-6 border-t-8 border-slate-800 shadow-sm max-w-2xl">
                <h2 class="text-sm font-black uppercase mb-4 tracking-widest">Müll Monitor</h2>
                <div id="mullList" class="space-y-2"></div>
            </div>
        </main>
    </div>

    <div id="bodenModal" class="fixed inset-0 bg-black/90 flex items-center justify-center hidden z-[200]">
        <div class="bg-white p-12 text-center max-w-lg border-b-[12px] border-[#1a3c34]">
            <h2 class="text-3xl font-black mb-4 uppercase">Bodendienst</h2>
            <p class="text-slate-500 mb-8 font-bold text-xl uppercase italic">Boden jetzt reinigen!</p>
            <button onclick="closeBoden()" class="bg-[#1a3c34] text-white px-12 py-5 text-xl uppercase font-black">Erledigt ✅</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ",
            databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", 
            authDomain: "dienste-fluxs.firebaseapp.com",
            projectId: "dienste-fluxs",
            storageBucket: "dienste-fluxs.firebasestorage.app",
            messagingSenderId: "137594684055",
            appId: "1:137594684055:web:2e2ddc1ed5ce8ff8f6dfd2"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userConfig = { name: "", station: "", wesche: false, mull: false, boden: false };
        let activeIntervals = { 1: null, 2: null, 3: null };

        function doLogin() {
            const name = document.getElementById('userName').value;
            const station = document.getElementById('userStation').value;
            if(!name) return alert("BITTE NAMEN EINGEBEN!");
            userConfig = { name, station, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked, boden: document.getElementById('checkBoden').checked };
            const onlineRef = database.ref('online_users/' + name + '_' + station);
            onlineRef.set(userConfig); onlineRef.onDisconnect().remove();
            
            document.getElementById('displayUser').innerText = `MA: ${name} | ${station}`;
            document.getElementById('activeStationDisplay').innerText = station;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            if(userConfig.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(userConfig.mull) document.getElementById('mullPanel').classList.remove('hidden');
            
            syncTimers(); listenToOnlineUsers();
            if(userConfig.boden) startBodenCheck();
            startResetCheck();
        }

        function listenToOnlineUsers() {
            database.ref('online_users').on('value', (s) => {
                const list = document.getElementById('statusList'); list.innerHTML = '';
                if(!s.val()) return;
                Object.values(s.val()).forEach(u => {
                    let r = []; if(u.wesche) r.push("Wäsche"); if(u.mull) r.push("Müll"); if(u.boden) r.push("Boden");
                    if(r.length === 0) r.push("Melder");
                    list.innerHTML += `<div class="border-b pb-1 text-[8px]"><span class="font-black text-[#1a3c34]">${u.name} (${u.station})</span>: <span class="text-slate-400">${r.join(', ')}</span></div>`;
                });
            });
        }

        function sendWash() {
            const notiz = document.getElementById('userNotiz').value;
            const urgent = document.getElementById('isUrgent').checked;
            database.ref('ves_pozivi/' + userConfig.station).set({ 
                station: userConfig.station, detail: "Wäschekorb voll", notiz, urgent,
                sender: userConfig.name, time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}), seenBy: ""
            });
            document.getElementById('isUrgent').checked = false; document.getElementById('userNotiz').value = ""; 
            const fb = document.getElementById('sendFeedback'); fb.classList.remove('hidden'); setTimeout(() => fb.classList.add('hidden'), 2000);
        }

        function triggerTimer(id) {
            const endTime = Date.now() + (80 * 60 * 1000);
            database.ref('timers/m' + id).set({ endTime, startedBy: userConfig.name, active: true });
        }

        function clearTimer(id) { database.ref('timers/m' + id).remove(); }

        function syncTimers() {
            [1, 2, 3].forEach(id => {
                database.ref('timers/m' + id).on('value', (s) => {
                    const data = s.val();
                    const box = document.getElementById('timer-box-' + id);
                    const val = document.getElementById('timer-val-' + id);
                    const btnStart = document.getElementById('btn-start-' + id);
                    const btnClear = document.getElementById('btn-clear-' + id);
                    
                    if(activeIntervals[id]) clearInterval(activeIntervals[id]);
                    box.classList.remove('timer-finished', 'bg-red-50');
                    
                    if(!data) {
                        val.textContent = "80:00"; btnStart.classList.remove('hidden'); btnClear.classList.add('hidden');
                        return;
                    }

                    btnStart.classList.add('hidden'); btnClear.classList.remove('hidden');

                    activeIntervals[id] = setInterval(() => {
                        const diff = data.endTime - Date.now();
                        if(diff <= 0) {
                            clearInterval(activeIntervals[id]); val.textContent = "FERTIG!"; box.classList.add('timer-finished');
                        } else {
                            const total = Math.floor(diff / 1000); const m = Math.floor(total / 60); const s = total % 60;
                            val.textContent = (m < 10 ? "0":"") + m + ":" + (s < 10 ? "0":"") + s;
                        }
                    }, 1000);
                });
            });
        }

        function quickMull(type) {
            database.ref('mull_pozivi/' + userConfig.station).set({ 
                station: userConfig.station, detail: type, sender: userConfig.name, 
                time: new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'}), seen: false
            });
        }

        database.ref('ves_pozivi/').on('value', (s) => renderLaundry(s));
        database.ref('mull_pozivi/').on('value', (s) => renderMull(s));

        function renderLaundry(snapshot) {
            if(!userConfig.wesche) return;
            const mainList = document.getElementById('wescheList');
            const myCart = document.getElementById('myCartList');
            const notizList = document.getElementById('notizList');
            const notizMonitor = document.getElementById('notizMonitor');
            
            mainList.innerHTML = ''; myCart.innerHTML = ''; notizList.innerHTML = '';
            let countInCart = 0; let hasNotizen = false;

            snapshot.forEach(child => {
                const item = child.val();
                const key = child.key;
                const card = `<div class="bg-white p-3 border-l-4 border-[#1a3c34] shadow-sm flex justify-between items-center text-[11px] ${item.urgent ? 'dringend-alert' : ''}">
                    <div><p class="font-black">${item.station}</p><p class="text-[9px]">${item.time} ${item.notiz ? '- ' + item.notiz : ''}</p></div>
                    <div class="flex gap-1">
                        ${!item.seenBy ? `<button onclick="takeToCart('${key}')" class="bg-slate-200 p-2">👁️</button>` : ''}
                        ${item.seenBy === userConfig.name ? `<button onclick="removeItem('ves_pozivi', '${key}')" class="bg-black text-white p-2">✔️</button>` : ''}
                    </div>
                </div>`;

                if(!item.seenBy) {
                    mainList.innerHTML += card;
                    if(item.notiz) {
                        hasNotizen = true;
                        notizList.innerHTML += `<div class="bg-white border-2 border-yellow-400 p-2 text-[10px] font-black uppercase">Station ${item.station}: ${item.notiz}</div>`;
                    }
                } else if(item.seenBy === userConfig.name) {
                    myCart.innerHTML += card;
                    countInCart++;
                }
            });

            notizMonitor.classList.toggle('hidden', !hasNotizen);
            updateEfficiency(countInCart);
        }

        function renderMull(snapshot) {
            if(!userConfig.mull) return;
            const list = document.getElementById('mullList'); list.innerHTML = '';
            snapshot.forEach(child => {
                const item = child.val();
                list.innerHTML += `<div class="bg-slate-100 p-3 border-l-4 border-slate-800 flex justify-between items-center text-xs">
                    <div><p class="font-black">${item.station}</p><p>${item.detail}</p></div>
                    <button onclick="removeItem('mull_pozivi', '${child.key}')" class="bg-black text-white p-2 text-[10px]">ERLEDIGT</button>
                </div>`;
            });
        }

        function takeToCart(key) { database.ref('ves_pozivi/' + key).update({ seenBy: userConfig.name }); }
        function removeItem(path, key) { database.ref(path + '/' + key).remove(); }
        function clearMyCart() {
            database.ref('ves_pozivi').once('value', s => {
                s.forEach(c => { if(c.val().seenBy === userConfig.name) c.ref.remove(); });
            });
        }

        function updateEfficiency(count) {
            const el = document.getElementById('efficiency-status');
            if(count >= 6) { el.className = "text-[9px] uppercase font-black p-2 mb-2 text-center eff-full"; el.innerText = `🚨 WAGEN VOLL (${count}/6) - ABHOLEN!`; }
            else { el.className = "text-[9px] uppercase font-black p-2 mb-2 bg-slate-100 text-center"; el.innerText = `Wagen: ${count}/6 Körbe`; }
        }

        function startBodenCheck() {
            setInterval(() => {
                const t = new Intl.DateTimeFormat('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }).format(new Date());
                if(t === "14:00") document.getElementById('bodenModal').classList.remove('hidden');
            }, 60000);
        }
        function closeBoden() { document.getElementById('bodenModal').classList.add('hidden'); }

        function startResetCheck() {
            setInterval(() => {
                const t = new Intl.DateTimeFormat('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }).format(new Date());
                if(t === "20:00") {
                    database.ref('ves_pozivi').remove(); database.ref('mull_pozivi').remove(); database.ref('timers').remove();
                }
            }, 60000);
        }
    </script>
</body>
</html>
