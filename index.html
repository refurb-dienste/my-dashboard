<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXS | AUFBEREITUNG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --waldgruen: #1a2f23;
            --dunkelgruen: #0f1a14;
            --hellgruen: #4ade80;
            --beige: #f5f5dc;
            --text-muted: #a8a29e;
        }

        body { 
            font-family: 'JetBrains Mono', monospace; 
            background-color: var(--dunkelgruen); 
            color: var(--beige);
            line-height: 1.5;
        }

        .border-fluxs { border-color: rgba(245, 245, 220, 0.1); }
        
        .btn-minimal {
            background-color: var(--beige);
            color: var(--dunkelgruen);
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-weight: 700;
        }
        .btn-minimal:hover { background-color: var(--hellgruen); }
        .btn-minimal:disabled { background-color: #2d3a33; color: #555; }

        .card-dark {
            background-color: var(--waldgruen);
            border: 1px solid rgba(245, 245, 220, 0.1);
        }

        /* Spezial-Blinker für SOS ohne Kindisch-Vibe */
        .sos-alert {
            animation: pulse-border 1s infinite;
            border: 2px solid #ef4444 !important;
        }
        @keyframes pulse-border {
            0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; }
        }

        .timer-done { background-color: #7f1d1d !important; color: white; }

        input, select {
            background: rgba(0,0,0,0.3) !important;
            border: 1px solid rgba(245, 245, 220, 0.2) !important;
            color: var(--beige) !important;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="sendFeedback" class="hidden fixed top-5 left-1/2 -translate-x-1/2 bg-beige text-dunkelgruen px-6 py-3 z-[300] font-bold uppercase border border-white shadow-2xl"></div>

    <div id="loginScreen" class="fixed inset-0 bg-[#0f1a14] z-[500] flex items-center justify-center p-4">
        <div class="w-full max-w-md p-8 border border-fluxs bg-[#1a2f23]">
            <div class="mb-10 text-center">
                <h1 class="text-2xl font-bold tracking-widest uppercase italic">Fluxs_</h1>
                <p class="text-[10px] opacity-50 uppercase tracking-[0.5em]">Aufbereitung Control</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="NAME" class="w-full p-4 outline-none focus:border-hellgruen">
                <select id="userStation" class="w-full p-4 outline-none">
                    <option value="wks050">STATION wks050</option>
                    <option value="wks051">STATION wks051</option>
                    </select>
                <div class="py-4 space-y-2">
                    <label class="flex items-center space-x-3 cursor-pointer opacity-80 hover:opacity-100">
                        <input type="checkbox" id="checkWesche" class="w-4 h-4 accent-hellgruen"> <span class="text-xs uppercase">🧺 Wäsche</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer opacity-80 hover:opacity-100">
                        <input type="checkbox" id="checkMull" class="w-4 h-4 accent-hellgruen"> <span class="text-xs uppercase">🗑️ Müll</span>
                    </label>
                    <label class="flex items-center space-x-3 cursor-pointer opacity-80 hover:opacity-100">
                        <input type="checkbox" id="checkBoden" class="w-4 h-4 accent-hellgruen"> <span class="text-xs uppercase">🧹 Boden</span>
                    </label>
                </div>
                <button onclick="doLogin()" class="w-full btn-minimal p-5 text-sm tracking-widest">Initialisieren</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <header class="border-b border-fluxs p-6 sticky top-0 bg-[#0f1a14]/95 backdrop-blur-sm z-50">
            <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-6">
                    <div class="text-2xl font-bold border border-beige px-3 py-1">F</div>
                    <div>
                        <h1 class="text-sm font-bold tracking-tighter uppercase">Operations Hub</h1>
                        <p id="displayUser" class="text-[9px] text-hellgruen uppercase tracking-widest"></p>
                    </div>
                </div>

                <div class="flex flex-wrap items-center gap-4">
                    <div id="statusList" class="text-[9px] text-stone-500 uppercase flex gap-3 italic border-r border-fluxs pr-4"></div>
                    <button onclick="quickMull('Restmüll 🗑️')" class="text-[10px] border border-beige/30 px-3 py-2 hover:bg-beige hover:text-dunkelgruen transition-all uppercase">🗑️ Müll</button>
                    <button onclick="sendWash()" class="bg-hellgruen text-dunkelgruen px-4 py-2 text-[10px] font-bold uppercase hover:opacity-80">🧺 Korb Voll</button>
                    <input type="text" id="userNotiz" placeholder="NOTIZ..." class="p-2 text-[10px] w-32 outline-none">
                    <label class="text-[10px] flex items-center gap-2 cursor-pointer border border-red-900 px-2 py-2 text-red-500 font-bold uppercase"><input type="checkbox" id="isUrgent">🚨 SOS</label>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-4 lg:p-10">
            <div id="weschePanel" class="hidden space-y-10">
                
                <div id="notizMonitor" class="hidden border border-hellgruen/30 p-4 bg-hellgruen/5">
                    <div id="notizList" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    
                    <div class="lg:col-span-3 card-dark p-6">
                        <h3 class="text-[10px] uppercase tracking-widest opacity-40 mb-6 border-b border-fluxs pb-2">Offene Abholungen</h3>
                        <div id="wescheList" class="space-y-3"></div>
                    </div>

                    <div class="lg:col-span-6 flex flex-col gap-6">
                        <div id="efficiency-status" class="card-dark p-8 text-center text-xs uppercase tracking-widest border-l-4 border-hellgruen italic">
                            System bereit...
                        </div>
                        <div class="card-dark p-6 border-t-2 border-beige">
                            <h3 class="text-[10px] uppercase opacity-40 mb-4 tracking-widest">Aktueller Wagen 🛒</h3>
                            <div id="myCartList" class="space-y-2 mb-8"></div>
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="fillMyCart()" class="border border-beige text-[10px] p-4 hover:bg-beige hover:text-dunkelgruen transition-all uppercase">Beladen [+]</button>
                                <button id="btn-clear-cart" onclick="clearMyCartAuto()" class="btn-minimal p-4 text-xs">Start Zyklus 🌀</button>
                            </div>
                            <p id="lock-msg" class="text-[9px] text-red-400 text-center mt-4 uppercase hidden">Warten auf freie Maschine...</p>
                        </div>
                    </div>

                    <div class="lg:col-span-3 space-y-4">
                        <h3 class="text-[10px] uppercase opacity-40 text-center tracking-widest mb-4">Produktion Units</h3>
                        <div id="timer-box-1" class="card-dark p-6 text-center group">
                            <p class="text-[9px] opacity-30 mb-2 italic">UNIT_01</p>
                            <div id="timer-val-1" class="text-3xl font-bold tracking-tighter">FREE</div>
                            <div id="machine-actions-1" class="mt-4 space-y-2"></div>
                        </div>
                        <div id="timer-box-2" class="card-dark p-6 text-center">
                            <p class="text-[9px] opacity-30 mb-2 italic">UNIT_02</p>
                            <div id="timer-val-2" class="text-3xl font-bold tracking-tighter">FREE</div>
                            <div id="machine-actions-2" class="mt-4 space-y-2"></div>
                        </div>
                        <div id="timer-box-3" class="card-dark p-6 text-center">
                            <p class="text-[9px] opacity-30 mb-2 italic">UNIT_03</p>
                            <div id="timer-val-3" class="text-3xl font-bold tracking-tighter">FREE</div>
                            <div id="machine-actions-3" class="mt-4 space-y-2"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="mullPanel" class="hidden max-w-xl mx-auto"><div id="mullList" class="space-y-3"></div></div>
        </main>
    </div>

    <div id="bodenModal" class="fixed inset-0 bg-dunkelgruen/95 flex items-center justify-center hidden z-[600] p-10">
        <div class="card-dark p-12 text-center border-hellgruen border-2">
            <h2 class="text-4xl font-bold mb-8 uppercase tracking-tighter italic">Bodendienst 🧹</h2>
            <button onclick="closeBoden()" class="btn-minimal px-12 py-6 text-lg">Abschließen</button>
        </div>
    </div>

    <script>
        // Firebase & Logic (Gleich geblieben wie Muscle Memory verlangt)
        const firebaseConfig = { apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ", databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", authDomain: "dienste-fluxs.firebaseapp.com", projectId: "dienste-fluxs", storageBucket: "dienste-fluxs.firebasestorage.app", messagingSenderId: "137594684055", appId: "1:137594684055:web:2e2ddc1ed5ce8ff8f6dfd2" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let userConfig = { name: "", station: "", wesche: false, mull: false, boden: false };
        let activeIntervals = { 1: null, 2: null, 3: null };
        let currentCartCount = 0; let lastWescheCount = 0; let lastMullCount = 0;

        function doLogin() {
            const n = document.getElementById('userName').value; const s = document.getElementById('userStation').value; if(!n) return;
            userConfig = { name: n.toUpperCase(), station: s, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked, boden: document.getElementById('checkBoden').checked };
            const onlineRef = database.ref('online_users/' + n + '_' + s); onlineRef.set(userConfig); onlineRef.onDisconnect().remove();
            document.getElementById('displayUser').innerText = `${n} | UNIT: ${s}`;
            document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden');
            if(userConfig.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(userConfig.mull) document.getElementById('mullPanel').classList.remove('hidden');
            syncTimers(); listenToOnlineUsers(); if(userConfig.boden) startBodenCheck(); startResetCheck();
        }

        function updateTabNotification(openW, openM) {
            const hasUrgent = document.querySelector('.sos-alert') !== null;
            if (hasUrgent) { document.title = "🚨 SOS WÄSCHE!"; }
            else if (openW > lastWescheCount) { document.title = "🧺 NEU: WÄSCHE"; }
            else { document.title = "FLUXS | HUB"; }
        }

        function syncTimers() {
            [1, 2, 3].forEach(id => {
                database.ref('timers/m' + id).on('value', (s) => {
                    const d = s.val(); const box = document.getElementById('timer-box-' + id); const val = document.getElementById('timer-val-' + id); const act = document.getElementById('machine-actions-' + id);
                    if(activeIntervals[id]) clearInterval(activeIntervals[id]); act.innerHTML = "";
                    if(!d) { val.textContent = "FREE"; val.className="text-3xl font-bold text-hellgruen"; checkFreeMachines(); return; }
                    const stopBtn = `<button onclick="finishMachine(${id})" class="w-full text-[8px] opacity-30 hover:opacity-100 uppercase mt-4">Manual Stop ×</button>`;
                    if(d.status === 'waschen') {
                        val.className="text-3xl font-bold text-beige italic";
                        activeIntervals[id] = setInterval(() => {
                            const diff = d.endTime - Date.now();
                            if(diff <= 0) { clearInterval(activeIntervals[id]); val.textContent = "DONE"; box.classList.add('timer-done'); act.innerHTML = `<button onclick="moveToDryer(${id})" class="btn-minimal w-full p-2 text-[10px]">Trockner 🔥</button>${stopBtn}`;
                            } else { const t = Math.floor(diff/1000); const m = Math.floor(t/60); const sec = t%60; val.textContent = (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec; act.innerHTML = stopBtn; }
                            checkFreeMachines();
                        }, 1000);
                    } else {
                        val.innerHTML = "DRY"; val.className="text-3xl font-bold text-beige";
                        act.innerHTML = `<button onclick="finishMachine(${id})" class="btn-minimal w-full p-2 text-[10px]">Lager OK</button>${stopBtn}`; checkFreeMachines();
                    }
                });
            });
        }

        function checkFreeMachines() {
            database.ref('timers').once('value', s => {
                const t = s.val() || {}; let free = 0; for(let i=1; i<=3; i++) { if(!t['m'+i]) free++; }
                updateCoach(currentCartCount, free);
            });
        }

        function updateCoach(cart, free) {
            const el = document.getElementById('efficiency-status'); const btn = document.getElementById('btn-clear-cart'); const lock = document.getElementById('lock-msg');
            let msg = "Wagen leer... 🛒"; if (cart > 0 && cart < 3) { msg = `Sammle weiter (${cart}/6)... 🏃`; }
            else if (cart >= 3 && cart < 6) { msg = free >= 1 ? `Effizient! ${cart} Körbe bereit. 🌀` : `Stau. Alle Maschinen besetzt. 🛑`; }
            else if (cart >= 6) { msg = free >= 2 ? "Maximum Output! Starten! 🚀" : "Wagen voll. Warte auf Unit... ☕"; }
            el.innerText = msg; btn.disabled = (free === 0 || cart < 3); lock.classList.toggle('hidden', free > 0);
        }

        async function clearMyCartAuto() {
            const snap = await database.ref('timers').once('value'); const t = snap.val() || {};
            let mid = null; for(let i=1; i<=3; i++) { if(!t['m'+i]) { mid=i; break; } }
            if(mid) {
                database.ref('timers/m'+mid).set({ endTime: Date.now()+(80*60*1000), status: 'waschen', startedBy: userConfig.name });
                database.ref('ves_pozivi').once('value', s => { s.forEach(c => { if(c.val().seenBy === userConfig.name) c.ref.remove(); }); });
            }
        }

        function moveToDryer(id) { database.ref('timers/m'+id).update({ status: 'trocknen' }); }
        function finishMachine(id) { database.ref('timers/m'+id).remove(); }
        function fillMyCart() { database.ref('ves_pozivi').once('value', s => { let c=0; s.forEach(x => { if(x.val().seenBy === userConfig.name) c++; }); s.forEach(x => { if(!x.val().seenBy && c<6) { database.ref('ves_pozivi/'+x.key).update({seenBy:userConfig.name}); c++; } }); }); }
        function sendWash() { const n = document.getElementById('userNotiz').value; const u = document.getElementById('isUrgent').checked; database.ref('ves_pozivi/'+Date.now()).set({ station: userConfig.station, notiz: n, urgent: u, sender: userConfig.name, time: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}), seenBy: "" }); document.getElementById('isUrgent').checked=false; document.getElementById('userNotiz').value=""; }
        function quickMull(t) { database.ref('mull_pozivi/'+Date.now()).set({ station: userConfig.station, detail: t, sender: userConfig.name, time: new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}), seen: false }); }

        function listenToOnlineUsers() { database.ref('online_users').on('value', (s) => { const l = document.getElementById('statusList'); l.innerHTML=''; if(!s.val()) return; Object.values(s.val()).forEach(u => { let d = []; if(u.wesche) d.push('🧺'); if(u.mull) d.push('🗑️'); l.innerHTML += `<span>${u.name}${d.join('')}</span>`; }); }); }

        database.ref('ves_pozivi/').on('value', (s) => {
            const ml = document.getElementById('wescheList'); const mc = document.getElementById('myCartList'); const nl = document.getElementById('notizList');
            ml.innerHTML=''; mc.innerHTML=''; nl.innerHTML=''; let cart=0; let open=0; let hasN=false;
            s.forEach(c => {
                const i = c.val(); const k = c.key; if(i.notiz && (!i.seenBy || i.seenBy === userConfig.name)) { hasN=true; nl.innerHTML += `<div class="bg-beige text-dunkelgruen px-2 py-1 text-[9px] uppercase font-bold">${i.station}: ${i.notiz}</div>`; }
                const card = `<div class="p-3 mb-2 flex justify-between items-center border border-fluxs ${i.urgent && !i.seenBy ? 'sos-alert' : ''}"><div class="text-[10px] font-bold">📍 ${i.station}</div><div>${!i.seenBy ? `<button onclick="database.ref('ves_pozivi/${k}').update({seenBy:userConfig.name})" class="bg-beige text-dunkelgruen px-3 py-1 text-[8px] font-bold uppercase">Get</button>` : `<button onclick="database.ref('ves_pozivi/${k}').remove()" class="text-red-500 px-2">×</button>`}</div></div>`;
                if(!i.seenBy) { ml.innerHTML += card; open++; } else if(i.seenBy === userConfig.name) { mc.innerHTML += card; cart++; }
            });
            updateTabNotification(open, lastMullCount); lastWescheCount = open; currentCartCount=cart; document.getElementById('notizMonitor').classList.toggle('hidden', !hasN); checkFreeMachines();
        });

        database.ref('mull_pozivi/').on('value', (s) => {
            const l = document.getElementById('mullList'); l.innerHTML=''; let count = 0;
            s.forEach(c => { count++; l.innerHTML += `<div class="card-dark p-4 flex justify-between items-center"><div class="text-xs font-bold uppercase">📍 ${c.val().station}<br><span class="text-[9px] opacity-40">${c.val().detail}</span></div><button onclick="database.ref('mull_pozivi/${c.key}').remove()" class="btn-minimal px-4 py-2 text-[10px]">OK</button></div>`; });
            updateTabNotification(lastWescheCount, count); lastMullCount = count;
        });

        function startBodenCheck() { setInterval(() => { const t = new Intl.DateTimeFormat('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }).format(new Date()); if(t === "14:00") document.getElementById('bodenModal').classList.remove('hidden'); }, 60000); }
        function closeBoden() { document.getElementById('bodenModal').classList.add('hidden'); }
        function startResetCheck() { setInterval(() => { const t = new Intl.DateTimeFormat('de-DE', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Berlin' }).format(new Date()); if(t === "20:00") { database.ref('ves_pozivi').remove(); database.ref('mull_pozivi').remove(); database.ref('timers').remove(); } }, 60000); }
    </script>
</body>
</html>
