<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>refurb-dienste</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; margin-bottom: 30px; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 { margin-top: 0; color: #444; font-size: 1.2rem; }
        .timer {
            font-size: 2.5rem;
            font-weight: bold;
            color: #e74c3c;
            margin: 15px 0;
        }
        .status { font-weight: bold; padding: 5px 10px; border-radius: 20px; }
        .status.ok { background: #d4edda; color: #155724; }
        
        /* Animation für den blinkenden Tab/Titel */
        @keyframes blink {
            0% { background-color: #fff; }
            50% { background-color: #ffcccc; }
            100% { background-color: #fff; }
        }
        .alarm-active {
            animation: blink 1s infinite;
            border: 2px solid red;
        }
    </style>
</head>
<body>

    <h1>Aufbereitung Dienste</h1>

    <div class="dashboard">
        <div id="wasch-card" class="card">
            <h2>Wäschedienst (Waschmaschine)</h2>
            <div id="timer-display" class="timer">90:00</div>
            <p>Status: <span class="status ok">In Betrieb</span></p>
        </div>

        <div class="card">
            <h2>Wäschekorb Status</h2>
            <div style="font-size: 3rem; margin: 10px;">🧺</div>
            <p>Status: <span id="korb-status" class="status ok">Platz verfügbar</span></p>
        </div>
    </div>

    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock_beep.ogg"></audio>

    <script>
        // Einstellungen
        let timeLeft = 90 * 60; // 90 Minuten in Sekunden
        const timerDisplay = document.getElementById('timer-display');
        const waschCard = document.getElementById('wasch-card');
        const alarmSound = document.getElementById('alarm-sound');
        const originalTitle = "refurb-dienste";

        const countdown = setInterval(() => {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;

            // Anzeige formatieren (00:00)
            timerDisplay.textContent = 
                (minutes < 10 ? "0" : "") + minutes + ":" + 
                (seconds < 10 ? "0" : "") + seconds;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                finishTimer();
            } else {
                timeLeft--;
            }
        }, 1000);

        function finishTimer() {
            timerDisplay.textContent = "FERTIG!";
            timerDisplay.style.color = "#27ae60";
            
            // Karte zum Leuchten/Blinken bringen
            waschCard.classList.add('alarm-active');
            
            // Alarmton abspielen
            alarmSound.play();

            // Den Tab-Titel blinken lassen
            let showingAlert = false;
            setInterval(() => {
                document.title = showingAlert ? "!!! FERTIG !!!" : originalTitle;
                showingAlert = !showingAlert;
            }, 1000);
        }

        // Beispiel: Korb-Logik (kannst du später anpassen)
        // Hier lassen wir den Alarm weg, wie gewünscht.
    </script>
</body>
</html>
