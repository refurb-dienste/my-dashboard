<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOCHENDIENST_MASTER v6.8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        :root { --wald: #1a2f23; --dunkel: #0f1a14; --hellgruen: #4ade80; --beige: #f5f5dc; }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--dunkel); color: var(--beige); font-size: 14px; overflow-x: hidden; }
        .card-dark { background-color: var(--wald); border: 1px solid rgba(245, 245, 220, 0.1); }
        .btn-minimal { background-color: var(--beige); color: var(--dunkel); text-transform: uppercase; font-weight: 800; }
        .notiz-alarm { background-color: #fef08a; color: #1a2f23; border-left: 10px solid #f97316; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--hellgruen); }
    </style>
</head>
<body>

    <div id="loginScreen" class="fixed inset-0 bg-[#0f1a14] z-[600] flex items-center justify-center p-4">
        <div class="w-full max-w-md p-10 border-2 border-hellgruen/20 bg-[#1a2f23] shadow-2xl">
            <h1 class="text-3xl font-black text-center text-hellgruen uppercase mb-8 italic">Wochendienst</h1>
            <div class="space-y-4">
                <input type="text" id="userName" placeholder="VORNAME" class="w-full p-4 bg-black/40 border border-white/10 text-white outline-none uppercase font-bold" oninput="checkLock()">
                <p id="lockMsg" class="text-[10px] text-yellow-400 font-bold uppercase hidden">⚠️ Dienst fest eingeteilt</p>
                <select id="userStation" class="w-full p-4 bg-black/40 border border-white/10 text-white outline-none font-bold"></select>
                <div class="grid grid-cols-1 gap-2 py-4 border-y border-white/10 text-sm">
                    <label class="flex items-center space-x-3"><input type="checkbox" id="checkWesche" class="w-5 h-5"> <span class="font-bold uppercase">🧺 Wäsche</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" id="checkMull" class="w-5 h-5 text-orange-500"> <span class="font-bold uppercase text-orange-400">🗑️ Müll</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" id="checkBoden" class="w-5 h-5 text-blue-500"> <span class="font-bold uppercase text-blue-400">🧹 Boden</span></label>
                </div>
                <button onclick="doLogin()" class="w-full btn-minimal p-5 tracking-widest hover:bg-hellgruen transition">Starten</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden flex flex-col min-h-screen">
        <header class="border-b border-white/10 p-4 bg-[#0f1a14]/95 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="text-xl font-black border-2 border-hellgruen px-2 text-hellgruen cursor-pointer" onclick="adminMenu()">R</div>
                    <div class="leading-tight">
                        <p id="displayUser" class="font-black uppercase text-xs text-white"></p>
                        <p id="displayStation" class="text-[9px] opacity-40 uppercase"></p>
                    </div>
                </div>
                
                <div id="onlineList" class="hidden md:flex gap-2 overflow-x-auto py-1 px-4 border-x border-white/5 max-w-lg"></div>

                <div class="flex items-center gap-2">
                    <input type="text" id="userNotiz" placeholder="NOTIZ..." class="p-2 text-[10px] w-24 bg-black/40 border border-white/10 text-white outline-none uppercase">
                    <button onclick="sendOnlyNote()" class="text-[9px] uppercase opacity-40 hover:opacity-100">Info</button>
                    <button id="btnKorb" onclick="sendWash()" class="bg-hellgruen text-dunkel px-3 py-2 font-black text-[10px] uppercase">Korb voll</button>
                    <button id="btnRest" onclick="sendMull('REST')" class="bg-orange-600 px-3 py-2 font-black text-[10px] uppercase">Rest</button>
                    <button id="btnPapier" onclick="sendMull('PAPIER')" class="bg-blue-600 px-3 py-2 font-black text-[10px] uppercase">Papier</button>
                    <button onclick="logout()" class="ml-2 opacity-20 hover:opacity-100 font-bold">X</button>
                </div>
            </div>
        </header>

        <div id="alarmArea" class="max-w-7xl mx-auto p-4 w-full"></div>
        <div id="mullAlarmArea" class="max-w-7xl mx-auto p-4 w-full"></div>

        <main class="flex-grow max-w-7xl mx-auto p-4 md:p-8 w-full space-y-6">
            <div id="weschePanel" class="hidden space-y-6">
                <div id="notizMonitor" class="hidden notiz-alarm p-4 shadow-lg text-sm font-bold uppercase">
                    <div id="notizList" class="space-y-1"></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 card-dark p-6">
                        <h3 class="text-[10px] font-black opacity-30 uppercase mb-4 italic">Offene Abholungen</h3>
                        <div id="wescheList" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
                    </div>
                    <div id="timerSection" class="space-y-6"></div>
                </div>
            </div>
            
            <div id="mullPanel" class="hidden card-dark p-6">
                <h3 class="text-[10px] font-black opacity-30 uppercase mb-4 italic text-orange-500">Mülldienst</h3>
                <div id="mullList" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs font-bold uppercase"></div>
            </div>
        </main>

        <footer id="nextWeekDisplay" class="hidden bg-black/60 p-2 text-center text-[9px] uppercase tracking-widest border-t border-white/5 opacity-50"></footer>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBjxSsvcZT0HVM9XDSFli8HYstQdnI-9UQ", databaseURL: "https://dienste-fluxs-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "dienste-fluxs" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        let user = null; let activeTimers = {};
        const mullGroups = { '050': 'g1', '051': 'g1', '052': 'g1', '053': 'g2', '054': 'g2', '055': 'g2', '056': 'g3', '057': 'g3', '058': 'g3', '059': 'g3' };
        const employees = ['Sabine', 'Daniela', 'Simone', 'Mira', 'Ramona', 'Minela', 'Mirsada', 'Patrick', 'Chiara', 'Victoria', 'Larissa', 'Agnieszka', 'Aushilfe 1', 'Aushilfe 2'];

        window.onload = () => {
            const sel = document.getElementById('userStation');
            for(let i=50; i<=59; i++) sel.innerHTML += `<option value="WKS0${i}">WKS0${i}</option>`;
            const saved = localStorage.getItem('refurb_v6.8');
            if(saved) {
                const u = JSON.parse(saved);
                const loginDate = new Date(u.loginTime);
                const now = new Date();
                if(now.getDate() !== loginDate.getDate() || now.getHours() >= 20) {
                    localStorage.removeItem('refurb_v6.8');
                } else {
                    user = u;
                    startApp();
                }
            }
        }

        function checkLock() {
            const n = document.getElementById('userName').value.trim().toUpperCase();
            db.ref('v6/mapping').once('value', s => {
                const map = s.val() || {};
                const w = document.getElementById('checkWesche'), m = document.getElementById('checkMull'), b = document.getElementById('checkBoden');
                let isLocked = false;
                if(map[n]) {
                    w.checked = map[n].includes("WÄSCHE"); m.checked = map[n].includes("MÜLL"); b.checked = map[n].includes("BODEN");
                    w.disabled = m.disabled = b.disabled = true; isLocked = true;
                } else {
                    // Check nextWeek
                    db.ref('v6/nextWeek').once('value', nw => {
                        const next = nw.val() || {};
                        const assigned = [];
                        if(next.Wäsche && next.Wäsche.toUpperCase() === n) assigned.push("WÄSCHE");
                        if(next.Müll && next.Müll.toUpperCase() === n) assigned.push("MÜLL");
                        if(next.Boden && next.Boden.toUpperCase() === n) assigned.push("BODEN");
                        if(assigned.length > 0) {
                            w.checked = assigned.includes("WÄSCHE"); m.checked = assigned.includes("MÜLL"); b.checked = assigned.includes("BODEN");
                            w.disabled = m.disabled = b.disabled = true; isLocked = true;
                        } else {
                            w.disabled = m.disabled = b.disabled = false;
                        }
                        document.getElementById('lockMsg').classList.toggle('hidden', !isLocked);
                    });
                }
                if(!isLocked) document.getElementById('lockMsg').classList.add('hidden');
            });
        }

        function doLogin() {
            const name = document.getElementById('userName').value.trim().toUpperCase();
            if(!name) return;
            user = { name: name, station: document.getElementById('userStation').value, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked, boden: document.getElementById('checkBoden').checked, loginTime: Date.now() };
            localStorage.setItem('refurb_v6.8', JSON.stringify(user));
            updatePresence();
            startApp();
        }

        function updatePresence() {
            if(!user) return;
            let d = ""; if(user.wesche) d+="🧺"; if(user.mull) d+="🗑️"; if(user.boden) d+="🧹";
            db.ref('v6/presence/' + user.name).set({ station: user.station, services: d, time: Date.now() });
        }

        function startApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUser').innerText = user.name;
            document.getElementById('displayStation').innerText = user.station;
            if(user.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(user.mull) document.getElementById('mullPanel').classList.remove('hidden');
            updatePresence();
            sync();
        }

        function sync() {
            db.ref('v6/presence').on('value', s => {
                const list = document.getElementById('onlineList'); list.innerHTML = '';
                s.forEach(snap => {
                    const p = snap.val();
                    list.innerHTML += `<div class="bg-white/5 px-2 py-1 rounded text-[9px] font-bold border border-white/10 whitespace-nowrap">${snap.key} @ ${p.station} ${p.services || ''}</div>`;
                });
                list.classList.toggle('hidden', s.numChildren() === 0);
            });

            db.ref('v6/nextWeek').on('value', s => {
                const d = s.val(); const f = document.getElementById('nextWeekDisplay');
                if(!d) { f.classList.add('hidden'); return; }
                const now = new Date(); if(now.getDay() === 1 && now.getHours() >= 6) { db.ref('v6/nextWeek').remove(); return; }
                f.classList.remove('hidden'); 
                const isThisWeek = now.getDay() !== 5; // Nicht Freitag
                const title = isThisWeek ? 'dienste diese woche' : 'Nächste Woche';
                const text = `📢 ${title}: ${d.Wäsche || '-'} - 🧺, ${d.Müll || '-'} - 🗑️, ${d.Boden || '-'} - 🧹`;
                f.innerText = text;
            });

            db.ref('v6/wash').on('value', s => {
                const list = document.getElementById('wescheList'); const nList = document.getElementById('notizList');
                list.innerHTML = ''; nList.innerHTML = ''; let count = 0; let hasNote = false;
                s.forEach(snap => {
                    const i = snap.val();
                    if(i.type === 'KORB') { count++; if(user.wesche) list.innerHTML += `<div class="p-3 card-dark border-l-4 border-hellgruen relative text-[11px] font-bold uppercase">${i.station}<br><span class="opacity-30 text-[8px]">${i.user}</span><button onclick="db.ref('v6/wash/${snap.key}').remove()" class="absolute right-2 top-2 font-black text-hellgruen">✓</button></div>`; }
                    if(i.note && user.wesche) { hasNote = true; nList.innerHTML += `<div class="flex justify-between items-center border-b border-black/5 pb-1"><span>${i.station}: ${i.note}</span><button onclick="db.ref('v6/wash/${snap.key}').update({note:null})" class="text-red-500 ml-2">X</button></div>`; }
                });
                document.getElementById('notizMonitor').classList.toggle('hidden', !hasNote);
                checkRundgang(count);
            });

            db.ref('v6/mull').on('value', s => {
                const list = document.getElementById('mullList'); if(!list) return; list.innerHTML = '';
                let countRest = 0, countPapier = 0;
                s.forEach(snap => { 
                    const type = snap.val().type;
                    if(type === 'REST') countRest++;
                    else if(type === 'PAPIER') countPapier++;
                    if(user.mull) list.innerHTML += `<div class="p-3 card-dark border-l-4 ${type==='REST'?'border-orange-500':'border-blue-500'} font-bold">${type}<br>${snap.val().station} <button onclick="db.ref('v6/mull/${snap.key}').remove()" class="text-[8px] underline ml-2 opacity-30">ERLEDIGT</button></div>`; 
                });
                checkMullAlert(countRest, countPapier);
            });

            const timers = document.getElementById('timerSection'); timers.innerHTML = '';
            [{m:'m1',t:'t1'},{m:'m2',t:'t2'},{m:'m3',t:'t3'}].forEach(p => {
                const d = document.createElement('div'); d.className="grid grid-cols-1 gap-2 p-2 border-b border-white/5"; d.innerHTML=`<div id="c-${p.m}"></div><div id="c-${p.t}"></div>`;
                timers.appendChild(d); setupDevice(p.m, 'Maschine', 70, `c-${p.m}`); setupDevice(p.t, 'Trockner', 90, `c-${p.t}`);
            });
            updateLockButtons();
        }

        function setupDevice(id, lbl, mins, cId) {
            db.ref('v6/timers/'+id).on('value', s => {
                const d = s.val(); const cont = document.getElementById(cId);
                if(!d) cont.innerHTML = `<button onclick="db.ref('v6/timers/${id}').set(Date.now()+${mins*60000})" class="w-full p-2 card-dark text-[10px] font-bold border-l-2 border-hellgruen uppercase italic hover:bg-white/5">${lbl} ${id.slice(1)} START</button>`;
                else {
                    if(activeTimers[id]) clearInterval(activeTimers[id]);
                    activeTimers[id] = setInterval(() => {
                        const r = d - Date.now();
                        if(r<=0) { cont.innerHTML = `<button onclick="db.ref('v6/timers/${id}').remove()" class="w-full p-2 bg-red-600 text-white text-[10px] font-black blink uppercase italic">${lbl} ${id.slice(1)} LEEREN</button>`; clearInterval(activeTimers[id]); }
                        else { const m=Math.floor(r/60000), sec=Math.floor((r%60000)/1000); cont.innerHTML = `<div class="w-full p-2 card-dark text-[10px] opacity-50 text-center font-bold italic">${lbl} ${id.slice(1)}: ${m}:${sec<10?'0':''}${sec} <button onclick="db.ref('v6/timers/${id}').remove()" class="ml-2 text-red-500">STOP</button></div>`; }
                    }, 1000);
                }
            });
        }

        async function checkRundgang(count) {
            if(!user.wesche) return;
            const t = (await db.ref('v6/timers').once('value')).val() || {};
            const al = document.getElementById('alarmArea');
            const allFree = !t.m1 && !t.m2 && !t.m3 && !t.t1 && !t.t2 && !t.t3;
            if(count >= 3 && allFree) {
                al.innerHTML = `<button onclick="startRundgang()" class="w-full p-6 bg-hellgruen text-dunkel font-black uppercase text-sm animate-bounce shadow-2xl border-2 border-white/20">🧺 Rundgang starten (Alles leeren)</button>`;
            } else al.innerHTML = '';
        }

        function startRundgang() { db.ref('v6/wash').once('value', s => { s.forEach(sn => { if(sn.val().type==='KORB') sn.ref.remove(); }); }); }

        let titleInterval = null;

        function checkMullAlert(countRest, countPapier) {
            const al = document.getElementById('mullAlarmArea');
            if(countRest >= 2 || countPapier >= 2 || (countRest + countPapier) >= 4) {
                if(user.mull) {
                    al.innerHTML = '<div class="p-4 bg-red-600 text-white font-bold uppercase blink">Müll entleeren: ' + countRest + ' Rest, ' + countPapier + ' Papier</div>';
                }
                if(!titleInterval) {
                    titleInterval = setInterval(() => {
                        document.title = document.title === "Müll entleeren" ? "WOCHENDIENST_MASTER v6.8" : "Müll entleeren";
                    }, 1000);
                }
            } else {
                al.innerHTML = '';
                if(titleInterval) {
                    clearInterval(titleInterval);
                    titleInterval = null;
                    document.title = "WOCHENDIENST_MASTER v6.8";
                }
            }
        }

        function sendWash() { 
            const last = localStorage.getItem('l_w'); if(last && Date.now()-last < 1800000) return;
            db.ref('v6/wash/'+Date.now()).set({station:user.station, user:user.name, note:document.getElementById('userNotiz').value, type:'KORB'});
            localStorage.setItem('l_w', Date.now()); document.getElementById('userNotiz').value=''; updateLockButtons();
        }

        function sendMull(t) { 
            const group = mullGroups[user.station] || 'other';
            const last = localStorage.getItem('l_m_'+group+'_'+t); if(last && Date.now()-last < 1800000) return;
            db.ref('v6/mull/'+Date.now()).set({station:user.station, type:t});
            localStorage.setItem('l_m_'+group+'_'+t, Date.now()); updateLockButtons();
        }

        function updateLockButtons() {
            const now = Date.now();
            const lW = localStorage.getItem('l_w');
            const btnK = document.getElementById('btnKorb');
            if(lW && now-lW < 1800000) { btnK.disabled = true; btnK.innerText = Math.ceil((1800000-(now-lW))/60000) + "M WARTEN"; } else { btnK.disabled = false; btnK.innerText = "KORB VOLL"; }
            
            const group = mullGroups[user.station] || 'other';
            ['REST', 'PAPIER'].forEach(t => { 
                const lM = localStorage.getItem('l_m_'+group+'_'+t); 
                const btn = document.getElementById('btn'+(t==='REST'?'Rest':'Papier')); 
                if(lM && now-lM < 1800000) { btn.disabled = true; btn.innerText = "WARTEN"; } 
                else { btn.disabled = false; btn.innerText = t; } 
            });
        }

        function sendOnlyNote() { 
            const n = document.getElementById('userNotiz').value.trim(); 
            if(n) { db.ref('v6/wash/'+Date.now()).set({station:user.station, user:user.name, note:n, type:'INFO'}); document.getElementById('userNotiz').value=''; }
        }

        function adminMenu() {
            const pw = prompt("PW?"); if(pw !== "admin123") return;
            const mode = prompt("1: Mapping (NAME:DIENSTE) | 2: Nächste Woche (W:Name, M:Name, B:Name)");
            if(mode === "1") {
                const val = prompt("Format: MAX:WÄSCHE MÜLL, TOM:BODEN");
                if(val) { const map={}; val.split(',').forEach(p=>{ const [n,d]=p.split(':').map(x=>x.trim().toUpperCase()); map[n]=d; }); db.ref('v6/mapping').set(map); }
            } else if(mode === "2") {
                const empList = employees.join(', ');
                const val = prompt(`Nächste Woche (W:Name, M:Name, B:Name)\nVerfügbare Namen: ${empList}`);
                if(val) {
                    const data = {}; val.split(',').forEach(p => { 
                        const [key, name] = p.split(':').map(x=>x.trim());
                        if(key.toUpperCase() === 'W') data.Wäsche = name;
                        if(key.toUpperCase() === 'M') data.Müll = name;
                        if(key.toUpperCase() === 'B') data.Boden = name;
                    });
                    db.ref('v6/nextWeek').set(data);
                }
            }
        }
        function logout() { if(user) db.ref('v6/presence/' + user.name).remove(); localStorage.removeItem('refurb_v6.8'); location.reload(); }
    </script>
</body>
</html>
