<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochendienst</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        :root { --wald: #1a2f23; --dunkel: #0f1a14; --hellgruen: #4ade80; --beige: #f5f5dc; }
        body { font-family: 'JetBrains Mono', monospace; background-color: var(--dunkel); color: var(--beige); font-size: calc(14px + 1.3mm); overflow-x: hidden; }
        .card-dark { background-color: var(--wald); border: 1px solid rgba(245, 245, 220, 0.1); }
        .btn-minimal { background-color: var(--beige); color: var(--dunkel); text-transform: uppercase; font-weight: 800; }
        .notiz-alarm { background-color: #fef08a; color: #1a2f23; border-left: 10px solid #f97316; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
        ::-webkit-scrollbar { height: 4px; width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--hellgruen); }
    </style>
</head>
<body>

    <div id="loginScreen" class="fixed inset-0 bg-[#0f1a14] z-[600] flex items-center justify-center p-4">
        <div class="w-full max-w-md p-10 border-2 border-hellgruen/20 bg-[#1a2f23] shadow-2xl">
            <h1 class="text-3xl font-black text-center text-hellgruen uppercase mb-8 italic">Wochendienst</h1>
            <div class="space-y-4">
                <div class="grid gap-3 sm:grid-cols-[1fr_10rem] items-start">
                    <div>
                        <input type="text" id="userName" autocomplete="off" spellcheck="false" placeholder="NAME (Tippen oder klicken)" class="w-full p-3 bg-black/40 border border-white/10 text-white outline-none rounded">
                    </div>
                    <div>
                        <p class="text-[9px] uppercase opacity-50 mb-2">Vorschläge</p>
                        <div id="nameSuggestions" class="grid grid-cols-2 gap-1 max-h-40 overflow-y-auto rounded border border-white/10 bg-black/20 p-1 text-[10px]"></div>
                    </div>
                </div>
                <p id="lockMsg" class="text-[10px] text-yellow-400 font-bold uppercase hidden">⚠️ Dienst fest eingeteilt</p>
                <select id="userStation" class="w-full p-4 bg-black/40 border border-white/10 text-white outline-none font-bold rounded"></select>
                <div class="grid grid-cols-1 gap-2 py-4 border-y border-white/10 text-sm">
                    <label class="flex items-center space-x-3"><input type="checkbox" id="checkWesche" class="w-5 h-5"> <span class="font-bold uppercase">🧺 Wäsche</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" id="checkMull" class="w-5 h-5 text-orange-500"> <span class="font-bold uppercase text-orange-400">🗑️ Müll</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" id="checkBoden" class="w-5 h-5 text-blue-500"> <span class="font-bold uppercase text-blue-400">🧹 Boden</span></label>
                </div>
                <button onclick="doLogin()" class="w-full btn-minimal p-5 tracking-widest hover:bg-hellgruen transition">Starten</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="hidden flex flex-col min-h-screen">
        <header class="border-b border-white/10 p-4 bg-[#0f1a14]/95 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto flex flex-col gap-3">
                <div class="flex flex-wrap items-center justify-between gap-3">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="text-xl font-black border-2 border-hellgruen px-2 text-hellgruen cursor-pointer shrink-0" onclick="adminMenu()" title="Admin: Klick, Passwort. Dienste eintragen — ab nächstem Montag 06:00">W</div>
                        <div class="leading-tight min-w-0">
                            <p id="displayUser" class="font-black uppercase text-sm text-white tracking-tight"></p>
                            <p id="displayStation" class="text-[11px] opacity-40 uppercase"></p>
                        </div>
                    </div>
                    <div class="flex flex-wrap items-center gap-2 justify-end">
                        <input type="text" id="userNotiz" placeholder="NOTIZ..." class="p-2 text-[12px] w-28 bg-black/40 border border-white/10 text-white outline-none uppercase rounded">
                        <button onclick="sendOnlyNote()" class="text-[11px] uppercase opacity-40 hover:opacity-100">Info</button>
                        <button id="btnKorb" onclick="sendWash()" class="bg-hellgruen text-dunkel px-3 py-2 font-black text-[12px] uppercase rounded">Korb voll</button>
                        <button id="btnRest" onclick="sendMull('REST')" class="bg-orange-600 px-3 py-2 font-black text-[12px] uppercase rounded">Rest</button>
                        <button id="btnPapier" onclick="sendMull('PAPIER')" class="bg-blue-600 px-3 py-2 font-black text-[12px] uppercase rounded">Papier</button>
                        <button onclick="logout()" class="ml-1 opacity-20 hover:opacity-100 font-bold text-sm">X</button>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row flex-wrap items-start gap-4 border-t border-white/5 pt-3">
                    <div id="dutyWeekBox" class="hidden card-dark border border-white/10 rounded px-2 py-1.5 min-w-[9rem] max-w-[20rem]">
                        <p id="dutyPlanHeading" class="duty-compact-head text-[8px] font-black uppercase opacity-45 mb-1 tracking-widest leading-none">Wochendienste</p>
                        <ul id="dutyWeekList" class="text-[11px] md:text-[12px] font-bold uppercase space-y-1 leading-snug"></ul>
                    </div>
                    <div id="onlineColumn" class="hidden flex-col min-w-0 flex-1 max-w-full sm:max-w-xl">
                        <p class="duty-compact-head text-[8px] font-black uppercase opacity-45 mb-1 tracking-widest leading-none">Online</p>
                        <div id="onlineList" class="flex flex-nowrap gap-1.5 overflow-x-auto py-0.5 text-[9px]"></div>
                    </div>
                </div>
            </div>
        </header>

        <div id="dutyPendingBanner" class="hidden w-full max-w-7xl mx-auto px-4 pt-2">
            <div class="notiz-alarm p-2 md:p-3 shadow-lg border border-orange-400/30 flex items-start gap-2 rounded">
                <div id="dutyPendingBannerMain" class="flex-1 min-w-0 text-[8px] md:text-[9px] font-bold uppercase leading-snug"></div>
                <button type="button" onclick="dismissDutyPendingBanner()" class="shrink-0 px-2 py-0.5 text-red-700 font-black text-sm leading-none hover:bg-black/10 rounded" title="Schließen">✕</button>
            </div>
        </div>

        <div id="alarmArea" class="max-w-7xl mx-auto p-4 w-full"></div>
        <div id="mullAlarmArea" class="max-w-7xl mx-auto p-4 w-full"></div>

        <main class="flex-grow max-w-7xl mx-auto p-4 md:p-8 w-full space-y-6">
            <div id="weschePanel" class="hidden space-y-6">
                <div id="notizMonitor" class="hidden notiz-alarm p-4 shadow-lg text-sm font-bold uppercase rounded">
                    <div id="notizList" class="space-y-1"></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 card-dark p-6 rounded">
                        <h3 class="text-[10px] font-black opacity-30 uppercase mb-4 italic">Offene Abholungen</h3>
                        <div id="wescheList" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
                    </div>
                    <div id="timerSection" class="space-y-6"></div>
                </div>
            </div>
            
            <div id="mullPanel" class="hidden card-dark p-6 rounded">
                <h3 class="text-[10px] font-black opacity-30 uppercase mb-4 italic text-orange-500">Mülldienst</h3>
                <div id="mullList" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs font-bold uppercase"></div>
            </div>
        </main>

        <div id="bodenReminderOverlay" class="hidden fixed inset-0 z-[700] flex items-center justify-center bg-[#0a0f0c]/95 backdrop-blur-sm p-6">
            <div class="w-full max-w-lg border-2 border-blue-500 bg-[#1a2f23] p-10 shadow-2xl text-center space-y-8 rounded">
                <p class="text-2xl md:text-3xl font-black uppercase text-blue-300 leading-tight">🧹 Zeit, den Boden zu kehren</p>
                <p class="text-xs uppercase opacity-50 tracking-widest">Bodendienst · täglich ab 14:00</p>
                <button type="button" onclick="dismissBodenReminder()" class="w-full btn-minimal p-5 text-base tracking-widest hover:bg-blue-500 hover:text-white transition rounded">Erledigt ✓</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBFIA8axjLxE_CDGbtSu1UiwgGl_2_HskQ", databaseURL: "https://wochendienst-v2-default-rtdb.europe-west1.firebasedatabase.app", projectId: "wochendienst-v2" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        let user = null; let activeTimers = {};
        let timerDoneBlinkInterval = null;
        let timerDoneLabel = '';
        const mullGroups = { '050': 'g1', '051': 'g1', '052': 'g1', '053': 'g2', '054': 'g2', '055': 'g2', '056': 'g3', '057': 'g3', '058': 'g3', '059': 'g3' };
        const APP_TITLE = 'Wochendienst';
        /** Anzeige + interner Name (Großbuchstaben) für Firebase / Mapping */
        const STAFF_MEMBERS = [
            { key: 'MINELA', label: 'Minela' }, { key: 'RAMONA', label: 'Ramona' }, { key: 'DANIELA', label: 'Daniela' },
            { key: 'SIMONE', label: 'Simone' }, { key: 'LARISSA', label: 'Larissa' }, { key: 'SABINE', label: 'Sabine' },
            { key: 'PATRICK', label: 'Patrick' }, { key: 'VICTORIA', label: 'Victoria' }, { key: 'KATHARINA', label: 'Katharina' },
            { key: 'MIRA', label: 'Mira' }, { key: 'AGNIESZKA', label: 'Agnieszka' }, { key: 'MIRSADA', label: 'Mirsada' },
            { key: 'AUSHILFE1', label: 'Aushilfe 1' }, { key: 'AUSHILFE2', label: 'Aushilfe 2' }
        ];
        const employees = STAFF_MEMBERS.map(s => s.label);

        function escapeHtml(str) {
            if(str == null || str === '') return '';
            const d = document.createElement('div');
            d.textContent = String(str);
            return d.innerHTML;
        }

        /** Nächster Montag 06:00 nach dem Zeitpunkt `from` (lokal). */
        function nextMondaySixAfter(fromDate) {
            const from = new Date(fromDate.getTime());
            let t = new Date(from.getFullYear(), from.getMonth(), from.getDate(), 6, 0, 0, 0);
            while(t.getDay() !== 1) t.setDate(t.getDate() + 1);
            if(t <= from) t.setDate(t.getDate() + 7);
            return t;
        }

        function mapObjectToSortedList(map) {
            if(!map || typeof map !== 'object') return [];
            return Object.keys(map).sort().map(k => ({ name: k, duties: map[k] || '' }));
        }

        function getPendingDismissSignature(at, pend) {
            if(!at || !pend || typeof pend !== 'object') return '';
            const keys = Object.keys(pend).sort();
            return String(at) + '|' + keys.map(k => k + ':' + String(pend[k])).join(';');
        }

        /** Zeilen: je Dienst die zugewiesenen Namen. `forBanner`: dunkle Labels auf gelbem Grund. */
        function mapToDutyAssignmentLines(map, forBanner) {
            if(!map || typeof map !== 'object') return [];
            const w = [], mu = [], bo = [];
            mapObjectToSortedList(map).forEach(l => {
                const u = String(l.duties || '').toUpperCase();
                if(u.includes('WÄSCHE')) w.push(l.name);
                if(u.includes('MÜLL')) mu.push(l.name);
                if(u.includes('BODEN')) bo.push(l.name);
            });
            const lab = forBanner ? 'text-[#1a2f23]' : 'opacity-65';
            const out = [];
            if(w.length) out.push('<span class="' + lab + '">🧺 Wäsche:</span> ' + w.map(escapeHtml).join(', '));
            if(mu.length) out.push('<span class="' + lab + '">🗑️ Müll:</span> ' + mu.map(escapeHtml).join(', '));
            if(bo.length) out.push('<span class="' + lab + '">🧹 Boden:</span> ' + bo.map(escapeHtml).join(', '));
            return out;
        }

        function dismissDutyPendingBanner() {
            db.ref('v6/dutyState').once('value', function(s) {
                const st = s.val() || {};
                const pend = st.pendingMap;
                const at = st.pendingEffectiveAt;
                if(!pend || !at || Date.now() >= at) return;
                localStorage.setItem('dutyPendingBannerDismissSig', getPendingDismissSignature(at, pend));
                renderDutyPlanUi(st);
            });
        }

        function tryApplyPendingDuties() {
            db.ref('v6/dutyState').once('value', function(s) {
                const st = s.val();
                if(!st || !st.pendingMap || !st.pendingEffectiveAt) return;
                if(Date.now() < st.pendingEffectiveAt) return;
                db.ref('v6/dutyState').transaction(function(curr) {
                    if(!curr || !curr.pendingMap || !curr.pendingEffectiveAt) return curr;
                    if(Date.now() < curr.pendingEffectiveAt) return curr;
                    return { activeMap: curr.pendingMap, pendingMap: null, pendingEffectiveAt: null };
                });
            });
        }

        function renderDutyPlanUi(state) {
            const st = state || {};
            const pend = st.pendingMap;
            const at = st.pendingEffectiveAt;
            const active = st.activeMap;
            const banner = document.getElementById('dutyPendingBanner');
            const bmain = document.getElementById('dutyPendingBannerMain');
            const box = document.getElementById('dutyWeekBox');
            const head = document.getElementById('dutyPlanHeading');
            const ul = document.getElementById('dutyWeekList');
            if(!box || !ul || !head) return;

            const pendKeys = pend && typeof pend === 'object' ? Object.keys(pend) : [];
            const showPending = pendKeys.length > 0 && at && Date.now() < at;
            const dismissSig = getPendingDismissSignature(at, pend);
            const dismissed = showPending && localStorage.getItem('dutyPendingBannerDismissSig') === dismissSig;

            if(showPending && bmain && banner) {
                if(!dismissed) {
                    banner.classList.remove('hidden');
                    const dt = new Date(at);
                    const dateStr = dt.toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
                    const lines = mapToDutyAssignmentLines(pend, true);
                    bmain.innerHTML = '<div class="space-y-1">' +
                        '<div class="flex flex-wrap items-baseline gap-1.5"><span class="text-sm leading-none shrink-0" aria-hidden="true">📰</span><span>Dienste nächste Woche</span></div>' +
                        (lines.length ? '<div class="opacity-95 space-y-0.5">' + lines.map(l => '<div>' + l + '</div>').join('') + '</div>' : '') +
                        '<div class="opacity-70 mt-1 normal-case tracking-normal text-[7px] md:text-[8px] font-bold">Gültig ab ' + escapeHtml(dateStr) + ', 06:00 Uhr (lokal).</div></div>';
                } else {
                    banner.classList.add('hidden');
                    bmain.innerHTML = '';
                }
            } else {
                if(banner) banner.classList.add('hidden');
                if(bmain) bmain.innerHTML = '';
            }

            if(showPending && dismissed) {
                head.textContent = 'Dienste nächste Woche';
                const lines = mapToDutyAssignmentLines(pend, false);
                ul.innerHTML = lines.map(l => '<li class="leading-tight">' + l + '</li>').join('');
                box.classList.remove('hidden');
                return;
            }

            if(showPending && !dismissed) {
                box.classList.add('hidden');
                ul.innerHTML = '';
                return;
            }

            const actKeys = active && typeof active === 'object' ? Object.keys(active) : [];
            if(actKeys.length > 0) {
                head.textContent = 'Wochendienste';
                const lines = mapToDutyAssignmentLines(active, false);
                ul.innerHTML = lines.map(l => '<li class="leading-tight">' + l + '</li>').join('');
                box.classList.remove('hidden');
                return;
            }

            box.classList.add('hidden');
            ul.innerHTML = '';
        }

        function migrateLegacyMappingToDutyState() {
            db.ref('v6/dutyState').once('value', ds => {
                const st = ds.val();
                const hasActive = st && st.activeMap && Object.keys(st.activeMap).length;
                const hasPending = st && st.pendingMap && Object.keys(st.pendingMap).length;
                if(hasActive || hasPending) return;
                db.ref('v6/mapping').once('value', ms => {
                    const m = ms.val();
                    if(!m || !Object.keys(m).length) return;
                    db.ref('v6/dutyState').set({ activeMap: m, pendingMap: null, pendingEffectiveAt: null });
                });
            });
        }

        function updateNameSuggestions(filter) {
            const list = document.getElementById('nameSuggestions');
            if(!list) return;
            const text = String(filter || '').trim().toLowerCase();
            const matches = STAFF_MEMBERS.filter(s => {
                const label = s.label.toLowerCase();
                const key = s.key.toLowerCase();
                return !text || label.includes(text) || key.includes(text);
            }).slice(0, 12);
            if(matches.length === 0) {
                list.innerHTML = '<div class="opacity-50 uppercase col-span-2">Keine Vorschläge</div>';
                return;
            }
            list.innerHTML = matches.map(s =>
                `<button type="button" onclick="selectSuggestedName('${s.label.replace(/'/g, "\\'") }')" class="w-full text-left px-2 py-1 rounded uppercase hover:bg-hellgruen/20 transition text-[10px]">${escapeHtml(s.label)}</button>`
            ).join('');
        }

        function selectSuggestedName(name) {
            const input = document.getElementById('userName');
            if(!input) return;
            input.value = name;
            checkLock();
            updateNameSuggestions(name);
            input.focus();
        }

        function findStaffByInput(input) {
            const trimmed = String(input || '').trim();
            if(!trimmed) return null;
            const upper = trimmed.toUpperCase();
            return STAFF_MEMBERS.find(s => s.key === upper || s.label.toUpperCase() === upper) || null;
        }

        function fillNameSuggestions() {
            updateNameSuggestions('');
        }

        function stationToGroup(station) {
            const s = String(station || '');
            const code = s.slice(-3);
            return mullGroups[code] || 'other';
        }

        function isAfterSessionEnd(date) {
            const now = date ? new Date(date) : new Date();
            return now.getHours() >= 20;
        }

        function expireSessionIfNeeded() {
            if(!isAfterSessionEnd()) return false;
            if(user) {
                logout();
                return true;
            }
            if(localStorage.getItem('refurb_v6.8')) {
                localStorage.removeItem('refurb_v6.8');
            }
            return true;
        }

        function scheduleSessionExpiryCheck() {
            setInterval(() => {
                if(user && isAfterSessionEnd()) logout();
            }, 60000);
        }

        window.onload = () => {
            expireSessionIfNeeded();
            fillNameSuggestions();
            migrateLegacyMappingToDutyState();
            tryApplyPendingDuties();
            if(window._globalDutyTimer) clearInterval(window._globalDutyTimer);
            window._globalDutyTimer = setInterval(tryApplyPendingDuties, 60000);
            const sel = document.getElementById('userStation');
            for(let i=50; i<=59; i++) sel.innerHTML += `<option value="WKS0${i}">WKS0${i}</option>`;
            const saved = localStorage.getItem('refurb_v6.8');
            if(saved) {
                const u = JSON.parse(saved);
                const loginDate = new Date(u.loginTime);
                const now = new Date();
                if(now.getDate() !== loginDate.getDate() || isAfterSessionEnd(now)) {
                    localStorage.removeItem('refurb_v6.8');
                } else {
                    claimStation(u.station, u.name, (ok, errMsg) => {
                        if(!ok) { localStorage.removeItem('refurb_v6.8'); alert(errMsg); return; }
                        user = u;
                        startApp();
                        scheduleSessionExpiryCheck();
                    });
                }
            }
            // Add event listeners for name input
            const nameInput = document.getElementById('userName');
            if(nameInput) {
                nameInput.addEventListener('input', (e) => {
                    updateNameSuggestions(e.target.value);
                    checkLock();
                });
                nameInput.addEventListener('focus', fillNameSuggestions);
            }
        }

        /** Eine WKS = max. eine Person (Name) gleichzeitig; bei Verbindungsabbruch wird die Belegung automatisch gelöscht. */
        function claimStation(station, name, cb) {
            const cRef = db.ref('v6/stationClaims/' + station);
            cRef.transaction(cur => {
                if(cur === null || cur.name === name) return { name: name, time: Date.now() };
                return;
            }, (err, committed, snap) => {
                if(err) { cb(false, 'WKS-Check: ' + err.message); return; }
                if(!committed) {
                    const holder = (snap && snap.val() && snap.val().name) ? snap.val().name : '?';
                    cb(false, 'Diese WKS ist schon von ' + holder + ' angemeldet. Bitte andere Station wählen oder warten.');
                    return;
                }
                cRef.onDisconnect().remove();
                db.ref('v6/presence/' + name).onDisconnect().remove();
                cb(true);
            });
        }

        function checkLock() {
            const raw = document.getElementById('userName').value.trim();
            const staff = findStaffByInput(raw);
            const nameKey = staff ? staff.key : raw.toUpperCase();
            db.ref('v6/dutyState').once('value', s => {
                const st = s.val() || {};
                const map = st.activeMap || {};
                const w = document.getElementById('checkWesche'), m = document.getElementById('checkMull'), b = document.getElementById('checkBoden');
                const isLocked = !!map[nameKey];
                if(isLocked) {
                    w.checked = map[nameKey].includes("WÄSCHE"); m.checked = map[nameKey].includes("MÜLL"); b.checked = map[nameKey].includes("BODEN");
                    w.disabled = m.disabled = b.disabled = true;
                } else {
                    w.disabled = m.disabled = b.disabled = false;
                }
                document.getElementById('lockMsg').classList.toggle('hidden', !isLocked);
            });
        }

        function doLogin() {
            const rawName = document.getElementById('userName').value.trim();
            const staff = findStaffByInput(rawName);
            if(!staff) { alert('Bitte wähle einen Namen aus der Liste.'); return; }
            const name = staff.key;
            const station = document.getElementById('userStation').value;
            claimStation(station, name, (ok, errMsg) => {
                if(!ok) { alert(errMsg); return; }
                user = { name, displayName: staff.label, station, wesche: document.getElementById('checkWesche').checked, mull: document.getElementById('checkMull').checked, boden: document.getElementById('checkBoden').checked, loginTime: Date.now() };
                localStorage.setItem('refurb_v6.8', JSON.stringify(user));
                updatePresence();
                startApp();
            });
        }

        function updatePresence() {
            if(!user) return;
            let d = ""; if(user.wesche) d+="🧺"; if(user.mull) d+="🗑️"; if(user.boden) d+="🧹";
            db.ref('v6/presence/' + user.name).set({ station: user.station, services: d, time: Date.now() });
        }

        function startApp() {
            if(!user) return;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayUser').innerText = user.displayName || user.name;
            document.getElementById('displayStation').innerText = user.station;
            if(user.wesche) document.getElementById('weschePanel').classList.remove('hidden');
            if(user.mull) document.getElementById('mullPanel').classList.remove('hidden');
            updatePresence();
            sync();
            const oc = document.getElementById('onlineColumn');
            if(oc) { oc.classList.remove('hidden'); oc.classList.add('flex'); }
            tickBodenReminder();
            if(user.boden) {
                if(window._bodenTick) clearInterval(window._bodenTick);
                window._bodenTick = setInterval(tickBodenReminder, 30000);
            }
            scheduleSessionExpiryCheck();
        }

        function sync() {
            db.ref('v6/presence').on('value', s => {
                const list = document.getElementById('onlineList');
                const col = document.getElementById('onlineColumn');
                if(!list || !col) return;
                list.innerHTML = '';
                s.forEach(snap => {
                    const p = snap.val();
                    list.innerHTML += '<div class="bg-white/5 px-1.5 py-0.5 rounded text-[8px] md:text-[9px] font-bold border border-white/10 whitespace-nowrap shrink-0">' + escapeHtml(snap.key) + ' @' + escapeHtml(p.station || '?') + ' ' + (p.services || '') + '</div>';
                });
                col.classList.remove('hidden');
                col.classList.add('flex');
            });

            db.ref('v6/dutyState').on('value', s => {
                renderDutyPlanUi(s.val());
            });

            db.ref('v6/wash').on('value', s => {
                const list = document.getElementById('wescheList'); const nList = document.getElementById('notizList');
                if(!user.wesche) {
                    if(list) list.innerHTML = '';
                    if(nList) nList.innerHTML = '';
                    document.getElementById('notizMonitor').classList.add('hidden');
                    checkRundgang(0);
                    return;
                }
                list.innerHTML = ''; nList.innerHTML = ''; let count = 0; let hasNote = false;
                s.forEach(snap => {
                    const i = snap.val();
                    if(i.type === 'KORB') { count++; list.innerHTML += `<div class="p-3 card-dark border-l-4 border-hellgruen relative text-[11px] font-bold uppercase rounded">${escapeHtml(i.station)}<br><span class="opacity-50 text-[9px]">${escapeHtml(i.user || '')}</span></div>`; }
                    if(i.note) { hasNote = true; nList.innerHTML += `<div class="flex justify-between items-center border-b border-black/5 pb-1"><span>${escapeHtml(i.station)}: ${escapeHtml(i.note)}</span><button onclick="db.ref('v6/wash/${snap.key}').remove()" class="text-red-500 text-[9px]">✕</button></div>`; }
                });
                document.getElementById('notizMonitor').classList.toggle('hidden', !hasNote);
                checkRundgang(count);
            });

            db.ref('v6/mull').on('value', s => {
                const list = document.getElementById('mullList'); if(!list) return;
                if(!user.mull) {
                    list.innerHTML = '';
                    checkMullAlert(0, 0);
                    return;
                }
                list.innerHTML = '';
                let countRest = 0, countPapier = 0;
                s.forEach(snap => { 
                    const type = snap.val().type;
                    if(type === 'REST') countRest++;
                    else if(type === 'PAPIER') countPapier++;
                    list.innerHTML += `<div class="p-3 card-dark border-l-4 ${type==='REST'?'border-orange-500':'border-blue-500'} font-bold rounded">${type}<br>${escapeHtml(snap.val().station)} <button onclick="db.ref('v6/mull/${snap.key}').remove()" class="text-red-500 text-[9px]">✕</button></div>`;
                });
                checkMullAlert(countRest, countPapier);
            });

            const timers = document.getElementById('timerSection'); timers.innerHTML = '';
            if(user.wesche) {
                [{m:'m1',t:'t1'},{m:'m2',t:'t2'},{m:'m3',t:'t3'}].forEach(p => {
                    const d = document.createElement('div'); d.className="grid grid-cols-1 gap-2 p-2 border-b border-white/5"; 
                    d.innerHTML=`<div id="c-${p.m}"></div><div id="c-${p.m}-alt" style="display:none;"></div><div id="c-${p.t}"></div>`;
                    timers.appendChild(d); 
                    // Maschine 1 and 3: 70 min, Maschine 2: 70 and 120 min
                    if(p.m === 'm2') {
                        setupDevice(p.m, 'Maschine', [70, 120], `c-${p.m}`);
                    } else {
                        setupDevice(p.m, 'Maschine', [70], `c-${p.m}`);
                    }
                    setupDevice(p.t, 'Trockner', [90], `c-${p.t}`);
                });
            }
            updateLockButtons();
        }

        function setupDevice(id, lbl, minsList, cId) {
            db.ref('v6/timers/'+id).on('value', s => {
                const endTime = s.val(); 
                const cont = document.getElementById(cId);
                if(!cont) return;
                
                if(activeTimers[id]) clearInterval(activeTimers[id]);
                
                if(!endTime) {
                    // No timer running - show start buttons
                    cont.innerHTML = minsList.map(mins => 
                        `<button onclick="startTimer('${id}', ${mins})" class="w-full p-2 card-dark text-[10px] font-bold border-l-2 border-hellgruen uppercase italic hover:bg-white/5 rounded mb-1">${lbl} ${id.slice(1)} - ${mins}min</button>`
                    ).join('');
                } else {
                    // Timer running - update countdown
                    activeTimers[id] = setInterval(() => {
                        const r = endTime - Date.now();
                        if(r <= 0) {
                            // Timer done - blink
                            cont.innerHTML = `<button onclick="stopTimer('${id}')" class="w-full p-2 bg-red-600 text-white text-[10px] font-black blink uppercase italic rounded">${lbl} ${id.slice(1)} LEEREN</button>`;
                            
                            // Determine the label for this device
                            let deviceLabel = '';
                            if(id.startsWith('m')) {
                                deviceLabel = 'Waschmaschine fertig';
                            } else if(id.startsWith('t')) {
                                deviceLabel = 'Trockner fertig';
                            }
                            
                            // Start blinking title
                            startTimerDoneBlinking(deviceLabel);
                            
                            clearInterval(activeTimers[id]);
                        } else {
                            const m = Math.floor(r/60000), sec = Math.floor((r%60000)/1000);
                            cont.innerHTML = `<div class="w-full p-2 card-dark text-[10px] opacity-50 text-center font-bold italic rounded">${lbl} ${id.slice(1)}: ${m}:${sec<10?'0':''}${sec} <button onclick="stopTimer('${id}')" class="ml-1 text-red-500 text-[9px]">✕</button></div>`;
                        }
                    }, 1000);
                }
            });
        }

        function startTimer(id, mins) {
            db.ref('v6/timers/'+id).set(Date.now() + mins * 60000);
        }

        function stopTimer(id) {
            db.ref('v6/timers/'+id).remove();
            stopTimerDoneBlinking();
        }

        function startTimerDoneBlinking(label) {
            if(timerDoneBlinkInterval) return;
            timerDoneLabel = label;
            timerDoneBlinkInterval = setInterval(() => {
                document.title = document.title === timerDoneLabel ? APP_TITLE : timerDoneLabel;
            }, 1000);
        }

        function stopTimerDoneBlinking() {
            if(timerDoneBlinkInterval) {
                clearInterval(timerDoneBlinkInterval);
                timerDoneBlinkInterval = null;
                timerDoneLabel = '';
                document.title = APP_TITLE;
            }
        }

        let titleInterval = null;
        let rundgangTitleShouldBlink = false;
        let rundgangTitleInterval = null;
        let bodenTitleInterval = null;
        const RUNDGANG_TITLE_ALT = '🧺 Rundgang starten';
        const BODEN_TITLE_ALT = '🧹 Boden kehren';

        function restoreDefaultTitleIfIdle() {
            if(!titleInterval && !rundgangTitleInterval && !bodenTitleInterval && !timerDoneBlinkInterval) document.title = APP_TITLE;
        }

        function stopBodenTitleBlink() {
            if(bodenTitleInterval) {
                clearInterval(bodenTitleInterval);
                bodenTitleInterval = null;
            }
            restoreDefaultTitleIfIdle();
        }

        function maybeStartBodenTitleBlink() {
            if(!user || !user.boden) return;
            const ov = document.getElementById('bodenReminderOverlay');
            if(!ov || ov.classList.contains('hidden')) return;
            if(titleInterval || rundgangTitleInterval) return;
            if(bodenTitleInterval) return;
            bodenTitleInterval = setInterval(() => {
                document.title = document.title === BODEN_TITLE_ALT ? APP_TITLE : BODEN_TITLE_ALT;
            }, 1000);
        }

        function bodenDoneStorageKey() {
            const d = new Date();
            return 'bodenErledigt_' + d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function isBodenKehrenDoneToday() {
            return !!localStorage.getItem(bodenDoneStorageKey());
        }

        function tickBodenReminder() {
            if(!user || !user.boden) {
                hideBodenReminderOverlay();
                return;
            }
            const h = new Date().getHours();
            if(h < 14 || isBodenKehrenDoneToday()) {
                hideBodenReminderOverlay();
                return;
            }
            showBodenReminderOverlay();
        }

        function showBodenReminderOverlay() {
            const el = document.getElementById('bodenReminderOverlay');
            if(!el) return;
            el.classList.remove('hidden');
            stopBodenTitleBlink();
            maybeStartBodenTitleBlink();
        }

        function hideBodenReminderOverlay() {
            const el = document.getElementById('bodenReminderOverlay');
            if(el) el.classList.add('hidden');
            stopBodenTitleBlink();
        }

        function dismissBodenReminder() {
            localStorage.setItem(bodenDoneStorageKey(), '1');
            hideBodenReminderOverlay();
            restoreDefaultTitleIfIdle();
        }

        function stopRundgangTitleBlink() {
            rundgangTitleShouldBlink = false;
            if(rundgangTitleInterval) {
                clearInterval(rundgangTitleInterval);
                rundgangTitleInterval = null;
            }
            restoreDefaultTitleIfIdle();
            maybeStartBodenTitleBlink();
        }

        function maybeStartRundgangTitleBlink() {
            if(!user || !user.wesche || !rundgangTitleShouldBlink) return;
            if(titleInterval) return;
            if(rundgangTitleInterval) return;
            stopBodenTitleBlink();
            rundgangTitleInterval = setInterval(() => {
                document.title = document.title === RUNDGANG_TITLE_ALT ? APP_TITLE : RUNDGANG_TITLE_ALT;
            }, 1000);
        }

        async function checkRundgang(count) {
            const al = document.getElementById('alarmArea');
            if(!user || !user.wesche) {
                if(al) al.innerHTML = '';
                stopRundgangTitleBlink();
                return;
            }
            const t = (await db.ref('v6/timers').once('value')).val() || {};
            const allFree = !t.m1 && !t.m2 && !t.m3 && !t.t1 && !t.t2 && !t.t3;
            if(count >= 3 && allFree) {
                stopBodenTitleBlink();
                al.innerHTML = `<button onclick="startRundgang()" class="w-full p-6 bg-hellgruen text-dunkel font-black uppercase text-sm animate-bounce shadow-2xl border-2 border-white/20 rounded">🧺 Rundgang starten</button>`;
                rundgangTitleShouldBlink = true;
                maybeStartRundgangTitleBlink();
            } else {
                al.innerHTML = '';
                stopRundgangTitleBlink();
            }
        }

        function startRundgang() { db.ref('v6/wash').once('value', s => { s.forEach(sn => { if(sn.val().type==='KORB') sn.ref.remove(); }); }); }

        function startMullRundgang() { db.ref('v6/mull').once('value', s => { s.forEach(sn => { sn.ref.remove(); }); }); }

        function checkMullAlert(countRest, countPapier) {
            const al = document.getElementById('mullAlarmArea');
            if(!user || !user.mull) {
                if(al) al.innerHTML = '';
                if(titleInterval) {
                    clearInterval(titleInterval);
                    titleInterval = null;
                }
                restoreDefaultTitleIfIdle();
                maybeStartRundgangTitleBlink();
                maybeStartBodenTitleBlink();
                return;
            }
            const mullCritical = countRest >= 2 || countPapier >= 2 || (countRest + countPapier) >= 4;
            if(mullCritical) {
                stopBodenTitleBlink();
                al.innerHTML = '<div class="space-y-3">' +
                    '<div class="p-4 bg-red-600 text-white font-bold uppercase blink text-[11px] md:text-sm rounded">Müll entleeren: ' + countRest + ' Rest, ' + countPapier + ' Papier</div>' +
                    '<button type="button" onclick="startMullRundgang()" class="w-full p-6 bg-hellgruen text-dunkel font-black uppercase text-sm animate-bounce shadow-2xl border-2 border-white/20 rounded">🗑️ Müll-Rundgang starten</button>' +
                    '</div>';
                if(!titleInterval) {
                    stopRundgangTitleBlink();
                    titleInterval = setInterval(() => {
                        document.title = document.title === 'Müll entleeren' ? APP_TITLE : 'Müll entleeren';
                    }, 1000);
                }
            } else {
                al.innerHTML = '';
            }
            if(titleInterval && !mullCritical) {
                clearInterval(titleInterval);
                titleInterval = null;
                restoreDefaultTitleIfIdle();
                maybeStartRundgangTitleBlink();
                maybeStartBodenTitleBlink();
            }
        }

        const WASH_COOLDOWN_MS = 30 * 60 * 1000;

        function washLockKey() { return 'l_w_' + user.station; }

        function sendWash() { 
            if(!user) return;
            const k = washLockKey();
            const last = localStorage.getItem(k); if(last && Date.now() - Number(last) < WASH_COOLDOWN_MS) return;
            db.ref('v6/wash/'+Date.now()).set({station:user.station, user:user.name, note:document.getElementById('userNotiz').value, type:'KORB'});
            localStorage.setItem(k, String(Date.now())); document.getElementById('userNotiz').value=''; updateLockButtons();
        }

        function sendMull(t) { 
            if(!user) return;
            const group = stationToGroup(user.station);
            const last = localStorage.getItem('l_m_'+group+'_'+t);
            if(last && Date.now() - Number(last) < 1800000) return;
            // Check server if this group already reported this type
            db.ref('v6/mull').once('value', snap => {
                let exists = false;
                snap.forEach(sn => {
                    const v = sn.val() || {};
                    const st = String(v.station || '');
                    const g = stationToGroup(st);
                    if(g === group && v.type === t) {
                        exists = true;
                    }
                });
                if(exists) {
                    alert('Diese Gruppe hat diesen Mülleimer bereits gemeldet.');
                    return;
                }
                const key = Date.now();
                db.ref('v6/mull/' + key).set({station: user.station, type: t, group: group});
                localStorage.setItem('l_m_'+group+'_'+t, String(Date.now()));
                updateLockButtons();
            });
        }

        function updateLockButtons() {
            const now = Date.now();
            const btnK = document.getElementById('btnKorb');
            const lW = localStorage.getItem(washLockKey());
            if(lW && now - Number(lW) < WASH_COOLDOWN_MS) { btnK.disabled = true; btnK.innerText = Math.ceil((WASH_COOLDOWN_MS - (now - Number(lW))) / 60000) + "M WARTEN"; } else { btnK.disabled = false; btnK.innerText = "KORB VOLL"; }
            // Mull buttons: combine local cooldown and server-side existing reports per group
            if(!user) return;
            const group = mullGroups[user.station] || 'other';
            const btnRest = document.getElementById('btnRest');
            const btnPapier = document.getElementById('btnPapier');
            const localLockRest = (() => {
                const v = localStorage.getItem('l_m_'+group+'_REST');
                return v && (now - Number(v) < 1800000);
            })();
            const localLockPapier = (() => {
                const v = localStorage.getItem('l_m_'+group+'_PAPIER');
                return v && (now - Number(v) < 1800000);
            })();
            // Default state until we learn server state
            if(localLockRest) { btnRest.disabled = true; btnRest.innerText = "WARTEN"; } else { btnRest.disabled = false; btnRest.innerText = "REST"; }
            if(localLockPapier) { btnPapier.disabled = true; btnPapier.innerText = "WARTEN"; } else { btnPapier.disabled = false; btnPapier.innerText = "PAPIER"; }
            // Query server to see if this group already has a report of the given type
            db.ref('v6/mull').once('value', snap => {
                let hasRest = false, hasPapier = false;
                snap.forEach(sn => {
                    const v = sn.val() || {};
                    const st = String(v.station || '');
                    const code = st.slice(-3);
                    const g = mullGroups[code] || v.group || 'other';
                    if(g === group) {
                        if(v.type === 'REST') hasRest = true;
                        if(v.type === 'PAPIER') hasPapier = true;
                    }
                });
                if(hasRest) { btnRest.disabled = true; btnRest.innerText = "WARTEN"; }
                if(hasPapier) { btnPapier.disabled = true; btnPapier.innerText = "WARTEN"; }
            });
        }

        function sendOnlyNote() { 
            const n = document.getElementById('userNotiz').value.trim(); 
            if(n) { db.ref('v6/wash/'+Date.now()).set({station:user.station, user:user.name, note:n, type:'INFO'}); document.getElementById('userNotiz').value=''; }
        }

        function adminMenu() {
            const pw = prompt("Admin-Passwort:");
            if(pw !== "admin123") { if(pw !== null && pw !== "") alert("Passwort falsch."); return; }
            const empList = employees.join(', ');
            const val = prompt(
                "Dienste eintragen (pro Person, bis nächsten Montag 06:00 Uhr Vorschau, danach aktiv):\n\n" +
                "Format: MAX:WÄSCHE MÜLL, TOM:BODEN, …\n" +
                "(Namen GROSS wie beim Login, z.B. MIRSADA)\n\n" +
                "Vorschläge: " + empList
            );
            if(!val) return;
            const map = {};
            val.split(',').forEach(p => {
                const [n, d] = p.split(':').map(x => x.trim().toUpperCase());
                if(n && d) map[n] = d;
            });
            if(!Object.keys(map).length) return;
            const when = nextMondaySixAfter(new Date()).getTime();
            db.ref('v6/dutyState').update({ pendingMap: map, pendingEffectiveAt: when });
        }
        function logout() {
            if(user) {
                db.ref('v6/presence/' + user.name).remove();
                db.ref('v6/stationClaims/' + user.station).remove();
            }
            localStorage.removeItem('refurb_v6.8');
            location.reload();
        }
    </script>
</body>
